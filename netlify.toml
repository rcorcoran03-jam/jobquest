[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[functions]]
  path = "/api/claude"
  timeout = 30

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS"
