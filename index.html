<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan's Hunt · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surf: #161b22; --surf2: #1c2330;
    --brd: #21262d; --brd2: #30363d;
    --tx: #e6edf3; --muted: #7d8590; --faint: #484f58;
    --amber: #f0a500; --amber-dim: #7a5200; --amber-bg: #1a1200;
    --green: #3fb950; --green-bg: #0d1f12; --green-dim: #1a3a20;
    --red: #f85149; --red-bg: #1f0d0d;
    --blue: #58a6ff; --blue-bg: #0d1f3a;
    --purple: #bc8cff; --purple-bg: #1a0d2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--tx); font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.5; }
  a { color: var(--amber); }
  input, textarea, select, button { font-family: 'DM Mono', monospace; font-size: 12px; }
  input, textarea, select {
    background: var(--surf); color: var(--tx); border: 1px solid var(--brd);
    border-radius: 6px; padding: 7px 11px; outline: none; width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  textarea { resize: vertical; }
  select { cursor: pointer; }
  button {
    cursor: pointer; border-radius: 6px; border: 1px solid var(--brd);
    background: transparent; color: var(--tx); padding: 6px 14px;
    transition: all .15s; letter-spacing: .03em;
  }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.amber { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 500; }
  button.amber:hover:not(:disabled) { opacity: .88; }
  button.ghost { color: var(--muted); border-color: transparent; }
  button.danger { color: var(--red); border-color: var(--red); }
  button.full { width: 100%; padding: 9px 0; font-size: 13px; }

  /* NAV */
  #nav {
    border-bottom: 1px solid var(--brd); height: 50px; display: flex;
    align-items: center; justify-content: space-between; padding: 0 24px;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  #nav .brand { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 300; letter-spacing: -.5px; }
  #nav .brand span { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--faint); margin-left: 8px; letter-spacing: .08em; }
  #nav .tabs { display: flex; gap: 2px; flex-wrap: wrap; justify-content: flex-end; }
  #nav .tabs button { font-size: 11px; padding: 5px 10px; }
  #nav .tabs button.active { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-dim); }
  #sync-status { font-size: 10px; color: var(--faint); letter-spacing: .04em; padding: 0 8px; white-space: nowrap; }

  /* MAIN */
  #main { max-width: 820px; margin: 0 auto; padding: 28px 24px; }

  /* SECTION HEAD */
  .sec-head { margin-bottom: 24px; }
  .sec-head h1 { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 300; letter-spacing: -.5px; margin-bottom: 6px; }
  .sec-head .bar { width: 28px; height: 2px; background: var(--amber); border-radius: 1px; }

  /* CARD */
  .card { background: var(--surf); border: 1px solid var(--brd); border-radius: 8px; padding: 1rem 1.25rem; animation: fadeIn .2s ease; margin-bottom: 10px; }
  .card:last-child { margin-bottom: 0; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:none } }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* GRID */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* LABEL */
  .lbl { font-size: 11px; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 4px; }

  /* BADGE */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; letter-spacing: .03em; white-space: nowrap; }
  .badge.amber { background: var(--amber-bg); color: var(--amber); }
  .badge.green { background: var(--green-bg); color: var(--green); }
  .badge.red { background: var(--red-bg); color: var(--red); }
  .badge.blue { background: var(--blue-bg); color: var(--blue); }
  .badge.purple { background: var(--purple-bg); color: var(--purple); }

  /* PILL */
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 12px; background: var(--bg); border: 1px solid var(--brd); color: var(--muted); margin: 2px; }

  /* TAGS */
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--brd); background: transparent; color: var(--muted); }
  .tag:hover { border-color: var(--brd2); }
  .tag.on { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-dim); }

  /* SPINNER */
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--brd); border-top-color: var(--amber); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }

  /* ROW */
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 0; color: var(--faint); }

  /* FEEDBACK BOX */
  .fb-box { margin-top: 10px; padding: 10px 12px; border-radius: 6px; background: var(--bg); border: 1px solid var(--green-dim); font-size: 12px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
  .fb-box .fb-lbl { color: var(--green); font-size: 11px; display: block; margin-bottom: 4px; }

  /* MSG BOX */
  .msg-box { padding: 10px 12px; border-radius: 6px; background: var(--bg); border: 1px solid var(--amber-dim); font-size: 12px; color: var(--tx); line-height: 1.7; white-space: pre-wrap; }

  /* ERROR */
  .err { color: var(--red); font-size: 12px; padding: 10px 12px; border-radius: 6px; background: var(--red-bg); border: 1px solid var(--red); margin-bottom: 10px; }

  /* POMODORO CIRCLE */
  #pom-svg { transform: rotate(-90deg); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 2px; }

  /* SETTINGS SCREEN */
  #settings-screen { max-width: 500px; margin: 0 auto; }

  /* STAGE FILTERS */
  .stage-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
</style>
</head>
<body>

<div id="nav">
  <div class="brand">Ryan's hunt <span>2026</span></div>
  <div style="display:flex;align-items:center;gap:6px">
    <span id="sync-status"></span>
    <div class="tabs">
    <button class="active" onclick="showTab('board')" id="tab-board">⊞ Job board</button>
    <button onclick="showTab('tracker')" id="tab-tracker">◈ Applications</button>
    <button onclick="showTab('cover')" id="tab-cover">◎ Cover letters</button>
    <button onclick="showTab('interview')" id="tab-interview">◇ Interview prep</button>
    <button onclick="showTab('pomodoro')" id="tab-pomodoro">◉ Focus timer</button>
    <button onclick="showTab('network')" id="tab-network">◌ Networking</button>
    <button onclick="showTab('sync')" id="tab-sync" style="border-color:var(--amber-dim);color:var(--amber)">⇅ Excel sync</button>
  </div>
  </div>
</div>

<div id="main">
  <div id="pane-board"></div>
  <div id="pane-tracker" style="display:none"></div>
  <div id="pane-cover" style="display:none"></div>
  <div id="pane-interview" style="display:none"></div>
  <div id="pane-pomodoro" style="display:none"></div>
  <div id="pane-network" style="display:none"></div>
  <div id="pane-sync" style="display:none"></div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────

const PROFILE = `Senior PM · Digital Health · Behavioral Health Analytics · Care Navigation · 0-1 Product Builds · MBA (Medical Industry, UMN Carlson) · BS Biomedical Sciences · Minneapolis MN · Remote-first · $120K–$160K target · 5+ yrs experience`;

const PRESETS = [
  {l:'PM – Digital Health', q:'"product manager" "digital health"'},
  {l:'Sr PM – Care Navigation', q:'"senior product manager" "care navigation"'},
  {l:'PM – Behavioral Health', q:'"product manager" "behavioral health" technology'},
  {l:'PM – Value-Based Care', q:'"product manager" "value-based care"'},
  {l:'PM – Health Analytics', q:'"product manager" "healthcare analytics"'},
  {l:'PM – Patient Engagement', q:'"product manager" "patient engagement"'},
  {l:'PM – Telehealth', q:'"product manager" telehealth OR "virtual care"'},
  {l:'PM – HealthTech Startup', q:'"product manager" healthtech startup remote'},
];

const STAGES = ['Saved','Applied','Phone Screen','Interview','Final Round','Offer','Rejected'];
const STAGE_COL = {Saved:'purple',Applied:'blue','Phone Screen':'amber',Interview:'amber','Final Round':'green',Offer:'green',Rejected:'red'};

const POM_TASKS = [
  'Search 3 new job boards','Tailor resume for a role','Write a cover letter',
  'Send 2 networking messages','Research a target company','Update application tracker',
  'Prep 5 interview answers','Follow up on an application','Review job alerts','Update LinkedIn',
];

const REL_COL = {Warm:'amber',Alumni:'blue',Cold:'purple',Recruiter:'green'};

// ── DEFAULT DATA ──────────────────────────────────────────────────────────────

const DEFAULT_APPS = [
  {id:1,company:'Enliven Health (Omnicell)',role:'PM – Clinical Solutions',stage:'Applied',priority:'High',date:'2026-04-30',salary:'$125–150K',notes:'Clinical pharmacy tech'},
  {id:2,company:'Oasis Health Partners',role:'Senior Manager, Product',stage:'Applied',priority:'High',date:'2026-04-30',salary:'$118–160K',notes:'Clare MesserSchmidt – warm contact'},
  {id:3,company:'Vori Health',role:'PM – Patient Experience',stage:'Applied',priority:'High',date:'2026-01-25',salary:'Not listed',notes:'Virtual MSK care'},
  {id:4,company:'Health-E Commerce',role:'Sr. PM – Telehealth',stage:'Applied',priority:'High',date:'2026-02-10',salary:'$140–180K',notes:'0-1 telehealth build'},
  {id:5,company:'Strive Health',role:'Digital PM – Patient Engagement',stage:'Saved',priority:'High',date:'',salary:'Not listed',notes:'Series D funded'},
  {id:6,company:'H1 Provider Intelligence',role:'Sr. PM – Digital Health Data',stage:'Saved',priority:'High',date:'',salary:'$130–155K',notes:'Open until Jun 24'},
];

const DEFAULT_CONTACTS = [
  {id:1,name:'Clare MesserSchmidt',company:'Oasis Health Partners',role:'Recruiter',rel:'Warm',last:'2026-04-26',next:'2026-05-10',notes:'Strong connection, future roles likely'},
  {id:2,name:'Greg Seely',company:'ABOUT Healthcare',role:'Alumni',rel:'Alumni',last:'2026-03-04',next:'2026-05-15',notes:'Outreach sent 3/4/26'},
  {id:3,name:'Dave Moen',company:'Oasis / Reema Health',role:'Network',rel:'Warm',last:'2026-04-10',next:'2026-05-12',notes:'Connected to multiple target companies'},
  {id:4,name:'Ben R.',company:'Reema Health',role:'Network',rel:'Warm',last:'2026-03-15',next:'2026-05-20',notes:'Minneapolis digital health network'},
];

// ── STATE ─────────────────────────────────────────────────────────────────────

let state = {
  tab: 'board',
  // Cloud credentials (persisted to localStorage — device-only, not synced)
  jbKey:  localStorage.getItem('jb_key')  || '',
  jbBin:  localStorage.getItem('jb_bin')  || '',
  adzunaId:  localStorage.getItem('adzuna_id')  || '',
  adzunaKey: localStorage.getItem('adzuna_key') || '',
  // Cloud sync status
  cloudLoading: false, cloudStatus: '', cloudError: '',
  // App data (loaded from JSONBin on startup, falls back to defaults)
  apps: DEFAULT_APPS,
  contacts: DEFAULT_CONTACTS,
  // Ephemeral UI state
  jobs: [], jobTotal: 0, jobPage: 1, jobLoading: false,
  jobPreset: 0, jobCustomQ: '', jobWhere: '', jobSalary: '120000', jobDays: '30', jobSort: 'date',
  analyzed: {}, analyzing: {},
  appFilter: 'all', appEditing: null, appShowAdd: false,
  coverCo: '', coverTone: 'professional', coverJD: '', coverOut: '', coverLoading: false,
  intRole: '', intCo: '', intQtype: 'behavioral', intQs: [], intAns: {}, intFb: {}, intLoading: false, intFbLoading: {},
  pomMode: 0, pomSecs: 25*60, pomTotal: 25*60, pomRunning: false,
  pomSessions: 0, pomTask: POM_TASKS[0], pomCustomTask: '', pomCustomMins: '', pomLog: [],
  netShowAdd: false, netDraft: '', netDraftFor: null, netDraftLoading: false,
};

let pomInterval = null;
let saveTimer = null;  // debounce cloud saves

// ── JSONBIN CLOUD SYNC ────────────────────────────────────────────────────────

const JB_URL = 'https://api.jsonbin.io/v3/b';

function jbHeaders(extra={}) {
  return { 'Content-Type': 'application/json', 'X-Master-Key': state.jbKey, ...extra };
}

// Create a new bin — called once during first-time setup
async function jbCreate() {
  const payload = { apps: state.apps, contacts: state.contacts, version: 1 };
  const resp = await fetch(JB_URL, {
    method: 'POST',
    headers: { ...jbHeaders(), 'X-Bin-Name': 'ryans-hunt-2026', 'X-Bin-Private': 'true' },
    body: JSON.stringify(payload)
  });
  if (!resp.ok) { const e = await resp.text(); throw new Error(`Create failed ${resp.status}: ${e.slice(0,200)}`); }
  const data = await resp.json();
  return data.metadata.id;
}

// Read latest data from bin
async function jbRead() {
  const resp = await fetch(`${JB_URL}/${state.jbBin}/latest`, {
    headers: jbHeaders({ 'X-Bin-Meta': 'false' })
  });
  if (!resp.ok) throw new Error(`Read failed ${resp.status}`);
  return resp.json(); // returns the record directly when X-Bin-Meta: false
}

// Write current apps+contacts to bin (debounced)
async function jbWrite() {
  if (!state.jbKey || !state.jbBin) return;
  const payload = { apps: state.apps, contacts: state.contacts, version: 1, updatedAt: new Date().toISOString() };
  const resp = await fetch(`${JB_URL}/${state.jbBin}`, {
    method: 'PUT',
    headers: jbHeaders(),
    body: JSON.stringify(payload)
  });
  if (!resp.ok) throw new Error(`Write failed ${resp.status}`);
}

// ── PERSISTENCE ───────────────────────────────────────────────────────────────

// Always save credentials to localStorage (device-level, intentionally local)
function saveCredentials() {
  if (state.jbKey)     localStorage.setItem('jb_key',      state.jbKey);
  if (state.jbBin)     localStorage.setItem('jb_bin',      state.jbBin);
  if (state.adzunaId)  localStorage.setItem('adzuna_id',   state.adzunaId);
  if (state.adzunaKey) localStorage.setItem('adzuna_key',  state.adzunaKey);
}

// Debounced cloud save — batches rapid changes into one write, 1.5s after last change
function save() {
  saveCredentials();
  if (!state.jbKey || !state.jbBin) {
    // Fallback: also save to localStorage so data isn't lost if cloud not set up
    localStorage.setItem('apps_backup', JSON.stringify(state.apps));
    localStorage.setItem('contacts_backup', JSON.stringify(state.contacts));
    return;
  }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncStatus('saving…', false);
    try {
      await jbWrite();
      setSyncStatus('✓ synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), false);
    } catch(e) {
      setSyncStatus('⚠ sync failed — ' + e.message, true);
    }
  }, 1500);
}

function setSyncStatus(msg, isError) {
  state.cloudStatus = msg; state.cloudError = isError;
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = isError ? 'var(--red)' : 'var(--green)'; }
}

// Load data from JSONBin on startup
async function loadFromCloud() {
  if (!state.jbKey || !state.jbBin) {
    // No cloud configured — try localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    const contactsBackup = localStorage.getItem('contacts_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
    if (contactsBackup) state.contacts = JSON.parse(contactsBackup);
    return;
  }
  try {
    const data = await jbRead();
    if (data.apps)    state.apps    = data.apps;
    if (data.contacts) state.contacts = data.contacts;
    setSyncStatus('✓ loaded from cloud', false);
  } catch(e) {
    setSyncStatus('⚠ cloud load failed — using local data', true);
    // Fall back to localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
  }
}

// ── RENDER ROUTER ─────────────────────────────────────────────────────────────

function showTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  ['board','tracker','cover','interview','pomodoro','network','sync'].forEach(t => {
    document.getElementById('pane-' + t).style.display = t === tab ? '' : 'none';
  });
  render(tab);
}

function render(tab) {
  const el = document.getElementById('pane-' + tab);
  switch(tab) {
    case 'board': renderBoard(el); break;
    case 'tracker': renderTracker(el); break;
    case 'cover': renderCover(el); break;
    case 'interview': renderInterview(el); break;
    case 'pomodoro': renderPomodoro(el); break;
    case 'network': renderNetwork(el); break;
    case 'sync': renderSync(el); break;
  }
}

// ── HTML HELPERS ──────────────────────────────────────────────────────────────

const h = (tag, attrs='', inner='') => `<${tag} ${attrs}>${inner}</${tag}>`;
const div = (cls, inner) => `<div class="${cls}">${inner}</div>`;
const secHead = title => `<div class="sec-head"><h1>${title}</h1><div class="bar"></div></div>`;
const badge = (label, color) => `<span class="badge ${color}">${label}</span>`;
const pill = label => `<span class="pill">${esc(label)}</span>`;
const lbl = text => `<div class="lbl">${text}</div>`;
const inp = (id, val, ph, style='') => `<input id="${id}" value="${esc(val)}" placeholder="${esc(ph)}" style="${style}">`;
const ta = (id, val, ph, rows=5) => `<textarea id="${id}" placeholder="${esc(ph)}" rows="${rows}">${esc(val)}</textarea>`;
const sel = (id, opts, val) => `<select id="${id}">${opts.map(o=>`<option value="${esc(o.v||o)}" ${(o.v||o)==val?'selected':''}>${esc(o.l||o)}</option>`).join('')}</select>`;
const btn = (id, label, cls='', onclick='') => `<button id="${id}" class="${cls}" onclick="${onclick}">${label}</button>`;
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmtDate = d => { if(!d) return ''; const days=Math.floor((Date.now()-new Date(d))/86400000); return days===0?'today':days===1?'yesterday':`${days}d ago`; };
const fmtSal = j => { if(!j.salary_min&&!j.salary_max) return null; const f=n=>n>=1000?`$${Math.round(n/1000)}K`:`$${n}`; if(j.salary_min&&j.salary_max) return `${f(j.salary_min)}–${f(j.salary_max)}${j.salary_is_predicted?' (est.)':''}`; return j.salary_min?`${f(j.salary_min)}+`:null; };

// ── API CALLS ─────────────────────────────────────────────────────────────────

async function claudeStream(prompt, onChunk) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,stream:true,messages:[{role:'user',content:prompt}]})
  });
  const reader = resp.body.getReader(), dec = new TextDecoder();
  let full = '';
  while(true) {
    const {done,value} = await reader.read(); if(done) break;
    for(const line of dec.decode(value).split('\n').filter(l=>l.startsWith('data: '))) {
      try { const j=JSON.parse(line.slice(6)); if(j.delta?.text){full+=j.delta.text;onChunk?.(full);} } catch{}
    }
  }
  return full;
}

async function claudeJSON(prompt) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})
  });
  const data = await resp.json();
  const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
  const s=text.indexOf('['),e=text.lastIndexOf(']');
  if(s===-1||e===-1) return [];
  return JSON.parse(text.slice(s,e+1));
}

async function adzunaSearch({q,where,salary,days,page=1}) {
  const p = new URLSearchParams({
    app_id:state.adzunaId, app_key:state.adzunaKey,
    results_per_page:12, what:q, 'content-type':'application/json', sort_by:'date'
  });
  if(where) p.set('where',where);
  if(salary) p.set('salary_min',salary);
  if(days) p.set('max_days_old',days);
  const resp = await fetch(`https://api.adzuna.com/v1/api/jobs/us/search/${page}?${p}`);
  if(!resp.ok){ const e=await resp.text(); throw new Error(`Adzuna ${resp.status}: ${e.slice(0,200)}`); }
  return resp.json();
}

// ── JOB BOARD ─────────────────────────────────────────────────────────────────

function renderBoard(el) {
  if(!state.adzunaId || !state.adzunaKey) { renderBoardSettings(el); return; }

  const presetBtns = PRESETS.map((p,i) =>
    `<button class="tag ${state.jobPreset===i&&!state.jobCustomQ?'on':''}" onclick="setPreset(${i})">${p.l}</button>`
  ).join('');

  const jobCards = sortedJobs().map(j => {
    const sal = fmtSal(j);
    const ana = state.analyzed[j.id];
    const anLoading = state.analyzing[j.id];
    return `<div class="card" style="border-left:none">
      <div style="margin-bottom:6px">
        <div style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:2px;line-height:1.3">${esc(j.title)}</div>

      </div>
      <div style="margin-bottom:8px">
        ${j.location?.display_name?pill(j.location.display_name):''}
        ${sal?pill(sal):''}
        ${j.created?pill(fmtDate(j.created)):''}
        ${j.contract_type?pill(j.contract_type.replace('_',' ')):''}
      </div>
      ${j.description?`<div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px">${esc(j.description.slice(0,240))}${j.description.length>240?'…':''}</div>`:''}
      <div class="row">

function saveCreds() {

}

function clearCreds() {
  state.adzunaId = ''; state.adzunaKey = '';
  localStorage.removeItem('adzuna_id'); localStorage.removeItem('adzuna_key');
  render('board');
}

function setPreset(i) { state.jobPreset = i; state.jobCustomQ = ''; render('board'); }

function sortedJobs() {
  return [...state.jobs].sort((a,b) =>
    state.jobSort === 'salary' ? (b.salary_min||0)-(a.salary_min||0) : new Date(b.created)-new Date(a.created)
  );
}

async function doJobSearch(page) {
  if(state.jobLoading) return;
  if(page===1) { state.jobs=[]; state.jobTotal=0; }
  state.jobLoading = true; render('board');
  const q = state.jobCustomQ.trim() || PRESETS[state.jobPreset].q;
  try {
    const data = await adzunaSearch({q, where:state.jobWhere, salary:state.jobSalary, days:state.jobDays, page});
    state.jobs = page===1 ? (data.results||[]) : [...state.jobs, ...(data.results||[])];
    state.jobTotal = data.count||0; state.jobPage = page;
  } catch(e) {
    state.jobLoading = false; render('board');
    const errEl = document.getElementById('job-error');
    if(errEl) errEl.innerHTML = `<div class="err" style="margin-top:8px">${esc(e.message)}</div>`;
    return;
  }
  state.jobLoading = false; render('board');
}

async function analyzeJob(id) {
  const job = state.jobs.find(j=>j.id==id); if(!job) return;
  state.analyzing[id] = true; render('board');
  await claudeStream(
    `Ryan Corcoran: ${PROFILE}. Analyze fit (4-5 sentences) for: ${job.title} at ${job.company?.display_name}. Description: ${(job.description||'').slice(0,800)}. Be specific about matching strengths AND real gaps.`,
    t => { state.analyzed[id]=t; const el=document.querySelector(`[data-jobid="${id}"] .fb-box`); if(el) el.innerHTML=`<span class="fb-lbl">fit analysis</span>${esc(t)}`; }
  );
  state.analyzing[id] = false; render('board');
}

function renderTracker(el) {
  const list = state.appFilter==='all' ? state.apps : state.apps.filter(a=>a.stage===state.appFilter);
  const counts = STAGES.reduce((acc,s)=>({...acc,[s]:state.apps.filter(x=>x.stage===s).length}),{});

  const filterBtns = ['all',...STAGES].map(s =>
    `<button class="tag ${state.appFilter===s?'on':''}" onclick="setAppFilter('${s}')">${s==='all'?`all (${state.apps.length})`:`${s} (${counts[s]||0})`}</button>`
  ).join('');

  const addForm = state.appShowAdd ? `
    <div class="card" style="border-color:var(--amber-dim);margin-bottom:12px">
      <div class="g2" style="margin-bottom:8px">
        ${inp('add-co','',  'Company')} ${inp('add-role','','Role title')}
        ${inp('add-sal','', 'Salary range')} ${inp('add-date','','Date applied')}
      </div>
      ${inp('add-notes','','Notes')}
      <div class="row" style="margin-top:8px">
        ${sel('add-stage',STAGES,'Saved')} ${sel('add-pri',['High','Medium','Low'],'High')}
        <button class="amber" onclick="addApp()">Save</button>
        <button onclick="state.appShowAdd=false;render('tracker')">Cancel</button>
      </div>
    </div>` : '';

  const cards = list.map(app => {
    if(state.appEditing === app.id) {
      return `<div class="card" style="margin-bottom:8px;border-left:3px solid var(--amber)">
        <div class="g2" style="margin-bottom:8px">
          ${inp(`e-co-${app.id}`,app.company,'Company')} ${inp(`e-role-${app.id}`,app.role,'Role')}
          ${inp(`e-sal-${app.id}`,app.salary,'Salary')} ${inp(`e-date-${app.id}`,app.date,'Date')}
        </div>
        ${inp(`e-notes-${app.id}`,app.notes,'Notes')}
        <div class="row" style="margin-top:8px"><button class="amber" onclick="saveEdit(${app.id})">Done</button></div>
      </div>`;
    }
    const lc = app.stage==='Offer'?'var(--green)':app.stage==='Rejected'?'var(--red)':'var(--amber)';
    return `<div class="card" style="margin-bottom:8px;border-left:3px solid ${lc}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="row" style="margin-bottom:3px;flex-wrap:wrap">
            <span style="font-size:14px;font-weight:600">${esc(app.company)}</span>
            ${badge(app.stage,STAGE_COL[app.stage]||'amber')}
            ${app.priority==='High'?badge('high priority','green'):''}
          </div>
          <div style="color:var(--muted)">${esc(app.role)}</div>
          ${(app.salary||app.date)?`<div style="font-size:11px;color:var(--faint);margin-top:2px">${[app.salary,app.date].filter(Boolean).map(esc).join(' · ')}</div>`:''}
          ${app.notes?`<div style="font-size:11px;color:var(--faint);margin-top:3px">${esc(app.notes)}</div>`:''}
        </div>
        <div class="row" style="margin-left:10px;flex-shrink:0">
          ${sel(`stg-${app.id}`,STAGES,app.stage)}
          <button onclick="setAppStage(${app.id},document.getElementById('stg-${app.id}').value)" style="font-size:11px">↑ Move</button>
          <button onclick="state.appEditing=${app.id};render('tracker')" style="font-size:11px">Edit</button>
          <button class="danger" onclick="delApp(${app.id})" style="font-size:11px">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = secHead('Applications') + `
    <div class="stage-filters">${filterBtns}<button class="amber" onclick="state.appShowAdd=!state.appShowAdd;render('tracker')" style="margin-left:auto">+ Add</button></div>

  `;
}

function setAppFilter(f) { state.appFilter=f; state.appEditing=null; render('tracker'); }
function setAppStage(id,stage) { state.apps=state.apps.map(a=>a.id===id?{...a,stage}:a); save(); render('tracker'); }
function delApp(id) { if(confirm('Remove this application?')) { state.apps=state.apps.filter(a=>a.id!==id); save(); render('tracker'); } }
function addApp() {
  const co=document.getElementById('add-co').value.trim(); if(!co)return;

function saveEdit(id) {

}

// ── POMODORO ──────────────────────────────────────────────────────────────────

function renderPomodoro(el) {
  const cur = [{key:'focus',label:'Focus',mins:25,col:'var(--amber)'},{key:'short',label:'Short break',mins:5,col:'var(--green)'},{key:'long',label:'Long break',mins:15,col:'var(--blue)'}][state.pomMode];
  const R=80, Circ=2*Math.PI*R, pct=state.pomSecs/state.pomTotal;
  const mm=String(Math.floor(state.pomSecs/60)).padStart(2,'0'), ss=String(state.pomSecs%60).padStart(2,'0');

  const taskBtns = POM_TASKS.map(t => `<button class="tag ${state.pomTask===t&&!state.pomCustomTask?'on':''}" onclick="setPomTask('${esc(t)}')">${esc(t)}</button>`).join('');

  const logRows = state.pomLog.slice(-6).reverse().map(l =>
    `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px"><span>${esc(l.task)}</span><span style="color:var(--faint)">${l.time} · ${l.mins}m</span></div>`
  ).join('');

  const dots = [...Array(4)].map((_,i) => `<div style="width:14px;height:14px;border-radius:50%;background:${i<(state.pomSessions%4)?'var(--amber)':'var(--surf)'};border:1px solid var(--brd)"></div>`).join('');

  el.innerHTML = secHead('Focus timer') + `
    <div class="row" style="margin-bottom:20px">
      ${[{l:'Focus',c:'var(--amber)'},{l:'Short break',c:'var(--green)'},{l:'Long break',c:'var(--blue)'}].map((m,i)=>`<button onclick="switchPomMode(${i})" style="flex:1;color:${state.pomMode===i?m.c:'var(--muted)'};border-color:${state.pomMode===i?m.c:'var(--brd)'}">${m.l}</button>`).join('')}
    </div>
    <div style="display:flex;justify-content:center;margin-bottom:20px">
      <div style="position:relative;width:200px;height:200px">
        <svg id="pom-svg" width="200" height="200">
          <circle cx="100" cy="100" r="${R}" fill="none" stroke="var(--surf)" stroke-width="8"/>
          <circle cx="100" cy="100" r="${R}" fill="none" stroke="${cur.col}" stroke-width="8" stroke-dasharray="${Circ}" stroke-dashoffset="${Circ*(1-pct)}" stroke-linecap="round" style="transition:${state.pomRunning?'stroke-dashoffset 1s linear':'none'}"/>
        </svg>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:42px;font-weight:500;letter-spacing:-2px;color:var(--tx)">${mm}:${ss}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${cur.label}</div>
        </div>
      </div>
    </div>
    <div class="row" style="justify-content:center;margin-bottom:16px">
      <button class="${state.pomRunning?'':'amber'}" style="min-width:90px;font-size:13px" onclick="togglePom()">${state.pomRunning?'Pause':state.pomSecs===state.pomTotal?'Start':'Resume'}</button>
      <button style="font-size:13px" onclick="resetPom()">Reset</button>
    </div>
    <div class="row" style="margin-bottom:16px">
      ${inp('pom-custom',state.pomCustomMins,'Custom duration (mins)','flex:1')}
      <button onclick="applyPomCustom()">Set</button>
    </div>
    <div class="card" style="margin-bottom:12px">
      ${lbl('Current task')}
      <div class="tag-row" style="margin-top:8px">${taskBtns}</div>
      ${inp('pom-task-custom',state.pomCustomTask,'Or type a custom task…')}
    </div>
    <div class="row" style="margin-bottom:${state.pomLog.length?'12px':'0'}">${dots}<span style="font-size:12px;color:var(--muted)">${state.pomSessions} session${state.pomSessions!==1?'s':''} today</span></div>
    ${state.pomLog.length?`<div class="card">${lbl('Today\'s log')}${logRows}</div>`:''}
  `;
  document.getElementById('pom-custom').addEventListener('input',e=>state.pomCustomMins=e.target.value);
  document.getElementById('pom-task-custom').addEventListener('input',e=>{ state.pomCustomTask=e.target.value; if(e.target.value) state.pomTask=''; });
}

function switchPomMode(i) {
  clearInterval(pomInterval); pomInterval=null;
  const mins=[25,5,15][i];
  state.pomMode=i; state.pomRunning=false; state.pomTotal=mins*60; state.pomSecs=mins*60;
  render('pomodoro');
}

function togglePom() {
  if(state.pomRunning) { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; }
  else {
    state.pomRunning=true;
    pomInterval=setInterval(()=>{
      state.pomSecs--;
      if(state.pomSecs<=0) {
        clearInterval(pomInterval); pomInterval=null; state.pomRunning=false;
        if(state.pomMode===0) {
          state.pomSessions++;
          state.pomLog.push({task:state.pomCustomTask||state.pomTask,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),mins:[25,5,15][state.pomMode]});
        }
        state.pomSecs=0;
      }
      render('pomodoro');
    },1000);
  }
  render('pomodoro');
}

function resetPom() { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; state.pomSecs=state.pomTotal; render('pomodoro'); }

function applyPomCustom() {
  const m=parseInt(document.getElementById('pom-custom').value);

async function genNetMsg(id) {

  state.netDraftLoading=true; state.netDraftFor=id; state.netDraft=''; render('network');
  await claudeStream(

// Column mapping — matches the Excel tracker's column headers exactly
const APP_COLS  = ['Company','Role Title','Salary Range','Location / Remote','Date Applied','Stage','Priority','Fit Score','Key Requirement Match','Gaps / Notes','Next Step','Next Step Date','Recruiter / Contact','Link / Source'];
const APP_KEYS  = ['company','role','salary','location','date','stage','priority','fit','keyReqs','gaps','nextStep','nextDate','contact','source'];
const NET_COLS  = ['Company','Role','Alumni Contact','Relationship','Last Touch','Next Touch','Status','Notes'];
const NET_KEYS  = ['company','role','name','rel','last','next','status','notes'];

function csvEscape(v) {
  const s = String(v == null ? '' : v);
  return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
}

function toCSV(rows, cols) {
  return [cols.join(','), ...rows.map(r => APP_KEYS.map ? r : r)].join('\n');
}

function appsToCSV() {
  const header = APP_COLS.join(',');
  const rows = state.apps.map(a =>
    APP_KEYS.map(k => csvEscape(a[k]||'')).join(',')
  );
  return [header, ...rows].join('\n');
}

function contactsToCSV() {
  const header = NET_COLS.join(',');
  const rows = state.contacts.map(c =>
    NET_KEYS.map(k => csvEscape(c[k]||'')).join(',')
  );
  return [header, ...rows].join('\n');
}

function downloadCSV(content, filename) {
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => { obj[h.trim()] = (vals[i]||'').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
    else if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

function importAppsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, skipped:0, msg:'No rows found in file.'};

  // Try to detect column mapping — accepts both exact Excel headers and app-internal keys
  const colMap = {};
  const firstRow = rows[0];
  const allHeaders = Object.keys(firstRow);

  // Map Excel column names → internal keys
  const excelToKey = {};
  APP_COLS.forEach((col,i) => { excelToKey[col] = APP_KEYS[i]; });
  // Also accept lowercase/trimmed variants
  APP_COLS.forEach((col,i) => { excelToKey[col.toLowerCase()] = APP_KEYS[i]; });
  // Also accept direct key names
  APP_KEYS.forEach(k => { excelToKey[k] = k; excelToKey[k.toLowerCase()] = k; });

  // Build per-row mapping
  const headerMap = {}; // header name → internal key
  allHeaders.forEach(h => {
    const key = excelToKey[h] || excelToKey[h.trim().toLowerCase()];
    if(key) headerMap[h] = key;
  });

  if(!headerMap['Company'] && !headerMap['company']) {
    return {count:0, skipped:0, msg:`Could not find a "Company" column. Headers found: ${allHeaders.slice(0,5).join(', ')}…`};
  }

  let added=0, skipped=0, updated=0;
  const existingCos = state.apps.map(a=>a.company.toLowerCase().trim());

  rows.forEach(row => {
    const mapped = {};
    Object.entries(headerMap).forEach(([h,k]) => { mapped[k] = row[h]||''; });
    const co = (mapped.company||'').trim();
    if(!co) { skipped++; return; }

    const existIdx = existingCos.indexOf(co.toLowerCase());
    if(existIdx !== -1) {
      // Update existing — merge in any non-empty fields from CSV
      const existing = state.apps[existIdx];
      APP_KEYS.forEach(k => { if(mapped[k]) existing[k] = mapped[k]; });
      updated++;
    } else {
      state.apps.push({
        id: Date.now() + Math.random(),
        company: mapped.company||'',
        role: mapped.role||'',
        salary: mapped.salary||'',
        location: mapped.location||'',
        date: mapped.date||'',
        stage: mapped.stage||'Applied',
        priority: mapped.priority||'Medium',
        fit: mapped.fit||'',
        keyReqs: mapped.keyReqs||'',
        gaps: mapped.gaps||'',
        nextStep: mapped.nextStep||'',
        nextDate: mapped.nextDate||'',
        contact: mapped.contact||'',
        source: mapped.source||'',
        notes: mapped.notes||mapped.gaps||'',
      });
      added++;
    }
  });

  save();
  return {count:added, updated, skipped, msg:`Done — ${added} added, ${updated} updated, ${skipped} skipped (blank company).`};
}

function importContactsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, msg:'No rows found.'};
  let added=0, skipped=0;
  const existingNames = state.contacts.map(c=>c.name.toLowerCase().trim());
  rows.forEach(row => {
    const name = (row['Alumni Contact']||row['Name']||row['name']||'').trim();
    if(!name){skipped++;return;}
    if(existingNames.includes(name.toLowerCase())){skipped++;return;}
    state.contacts.push({
      id: Date.now()+Math.random(), name,
      company: row['Company']||row['company']||'',
      role: row['Role']||row['role']||'',
      rel: row['Relationship']||row['rel']||'Warm',
      last: row['Last Touch']||row['last']||'',
      next: row['Next Touch']||row['next']||'',
      notes: row['Notes']||row['notes']||'',
    });
    added++;
  });
  save();
  return {count:added, skipped, msg:`Done — ${added} contacts added, ${skipped} skipped.`};
}

async function doCloudSetup() {
  const key = document.getElementById('setup-jb-key').value.trim();
  if (!key) { document.getElementById('setup-error').textContent = 'Please enter your Master Key.'; return; }
  const btn = document.getElementById('setup-btn');
  btn.disabled = true; btn.textContent = 'Creating bin…';
  state.jbKey = key;
  try {
    const binId = await jbCreate();
    state.jbBin = binId;
    saveCredentials();
    document.getElementById('setup-error').textContent = '';
    showTab('board');
    setSyncStatus('✓ cloud connected · bin ' + binId.slice(0,8) + '…', false);
  } catch(e) {
    state.jbKey = '';
    document.getElementById('setup-error').textContent = 'Error: ' + e.message;
    btn.disabled = false; btn.textContent = 'Create my data bin →';
  }
}

async function doExistingSetup() {
  const key = document.getElementById('setup-existing-key').value.trim();
  const bin = document.getElementById('setup-existing-bin').value.trim();
  if (!key || !bin) { document.getElementById('setup-error').textContent = 'Enter both Master Key and Bin ID.'; return; }
  state.jbKey = key; state.jbBin = bin;
  try {
    const data = await jbRead();
    if (data.apps) state.apps = data.apps;
    if (data.contacts) state.contacts = data.contacts;
    saveCredentials();
    showTab('board');
    setSyncStatus('✓ reconnected · ' + state.apps.length + ' apps loaded', false);
  } catch(e) {
    state.jbKey = ''; state.jbBin = '';
    document.getElementById('setup-error').textContent = 'Could not connect: ' + e.message;
  }
}

function skipCloudSetup() {
  localStorage.setItem('cloud_skipped', '1');
  showTab('board');
}

function disconnectCloud() {
  if (!confirm('Disconnect cloud sync? Your data stays on this device but won\'t sync to other devices.')) return;
  state.jbKey = ''; state.jbBin = '';
  localStorage.removeItem('jb_key'); localStorage.removeItem('jb_bin');
  localStorage.removeItem('cloud_skipped');
  location.reload();
}

async function init() {
  const hasCloud = state.jbKey && state.jbBin;
  const skipped  = localStorage.getItem('cloud_skipped');

  if (!hasCloud && !skipped) {
    // First run — show cloud setup screen overlaid on top of board pane
    const el = document.getElementById('pane-board');
    renderCloudSetup(el);
    return;
  }

  if (hasCloud) {
    setSyncStatus('loading…', false);
    await loadFromCloud();
  }

  render('board');
}

init();
</script>
</body>
</html>
