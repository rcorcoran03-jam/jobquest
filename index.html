<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobQuest · 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Core palette */
    --jade:        #2A5F52;
    --jade-light:  #3D8A76;
    --jade-pale:   #E8F3EF;
    --jade-mid:    #9FCBB8;
    --rose:        #9E4A62;
    --rose-pale:   #FBF0F2;
    --rose-border: #F4C0D1;
    --gold:        #C9961A;
    --gold-pale:   #FDF3DC;
    --gold-border: #E8C97A;
    --cream:       #F5F1E8;
    --cream-dark:  #EDE7D8;
    --cream-border:#D8D0BE;
    --surf:        #FFFFFF;
    --surf2:       #FDFAF5;
    /* Text */
    --tx:    #1E3D33;
    --muted: #6B5F50;
    --faint: #9C8E7A;
    /* Stage card backgrounds */
    --card-saved:              #F7F4EE;
    --card-applied:            #EEF6F0;
    --card-coffee:             #FDF8EC;
    --card-screen:             #FEF9EE;
    --card-interview:          #FDF8EC;
    --card-offer:              #EEF6F0;
    --card-rejected:           #FBF0F2;
    --card-ghosted:            #F4F0F8;
    --card-default:            #FDFAF5;
    /* Semantic */
    --green:     #2A5F52; --green-bg: #E8F3EF; --green-dim: #9FCBB8;
    --red:       #9E4A62; --red-bg:   #FBF0F2;
    --blue:      #185FA5; --blue-bg:  #E6F1FB;
    --purple:    #7C52B0; --purple-bg:#F0EBF8;
    --amber:     #C9961A; --amber-dim:#E8C97A; --amber-bg: #FDF3DC;
    --teal:      #0F7B6C; --teal-bg:  #E1F5EE; --teal-dim: #5DCAA5;
    --brd:       #D8D0BE; --brd2: #C8C0AE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--tx); font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif; font-size: 13px; line-height: 1.5; }
  a { color: var(--jade); }
  input, textarea, select, button { font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif; font-size: 12px; }
  input, textarea, select {
    background: var(--surf); color: var(--tx); border: 1px solid var(--brd);
    border-radius: 6px; padding: 7px 11px; outline: none; width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  textarea { resize: vertical; }
  select { cursor: pointer; }
  button {
    cursor: pointer; border-radius: 6px; border: 1px solid var(--brd);
    background: var(--surf2); color: var(--tx); padding: 6px 14px;
    transition: all .15s; letter-spacing: .01em;
  }
  button:hover:not(:disabled) { background: var(--cream-dark); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.amber { background: var(--jade); color: #fff; border-color: var(--jade); font-weight: 500; }
  button.amber:hover:not(:disabled) { background: var(--jade-light); border-color: var(--jade-light); }
  button.ghost { color: var(--faint); border-color: transparent; background: transparent; }
  button.danger { color: var(--rose); border-color: var(--rose-border); background: var(--rose-pale); }
  button.full { width: 100%; padding: 9px 0; font-size: 13px; }

  /* NAV */
  #nav {
    border-bottom: 1px solid var(--brd); height: 50px; display: flex;
    align-items: center; justify-content: space-between; padding: 0 24px;
    position: sticky; top: 0; background: var(--jade); z-index: 100;
  }
  #nav .brand { display: flex; align-items: center; gap: 10px; }
  #nav .brand .logo { width: 30px; height: 30px; border-radius: 8px; background: var(--rose); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #nav .brand-name { font-size: 17px; font-weight: 600; color: var(--cream); letter-spacing: -.2px; }
  #nav .brand-year { font-size: 10px; color: var(--jade-mid); letter-spacing: .06em; margin-left: 2px; }
  #nav .tabs { display: flex; gap: 2px; flex-wrap: wrap; justify-content: flex-end; }
  #nav .tabs button { font-size: 11px; padding: 5px 10px; background: transparent; border-color: transparent; color: rgba(245,241,232,0.55); }
  #nav .tabs button:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: var(--cream); }
  #nav .tabs button.active { background: rgba(255,255,255,0.13); color: var(--cream); border-color: rgba(255,255,255,0.18); }
  #sync-status { font-size: 10px; color: var(--jade-mid); letter-spacing: .03em; padding: 0 6px; white-space: nowrap; }

  /* MAIN */
  #main { max-width: 820px; margin: 0 auto; padding: 28px 24px; }

  /* SECTION HEAD */
  .sec-head { margin-bottom: 24px; }
  .sec-head h1 { font-size: 22px; font-weight: 600; color: var(--jade); letter-spacing: -.3px; margin-bottom: 6px; }
  .sec-head .bar { width: 28px; height: 2px; background: var(--rose); border-radius: 1px; }

  /* CARD */
  .card { background: var(--surf); border: 1px solid var(--brd); border-radius: 10px; padding: 1rem 1.25rem; animation: fadeIn .2s ease; margin-bottom: 10px; }
  .card:last-child { margin-bottom: 0; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:none } }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* GRID */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* LABEL */
  .lbl { font-size: 11px; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 4px; font-weight: 500; }

  /* BADGE */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; letter-spacing: .02em; white-space: nowrap; font-weight: 500; border: 1px solid transparent; }
  .badge.amber { background: var(--amber-bg); color: #6B4A00; border-color: var(--gold-border); }
  .badge.green { background: var(--green-bg); color: var(--jade); border-color: var(--jade-mid); }
  .badge.red   { background: var(--red-bg);   color: #6B1828;  border-color: var(--rose-border); }
  .badge.blue  { background: var(--blue-bg);  color: var(--blue); border-color: #B5D4F4; }
  .badge.purple{ background: var(--purple-bg);color: #4A2870;  border-color: #C4A8E8; }
  .badge.teal  { background: var(--teal-bg);  color: var(--teal); border-color: var(--teal-dim); }

  /* PILL */
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; background: var(--cream); border: 1px solid var(--cream-border); color: var(--muted); margin: 2px; }

  /* TAGS */
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--brd); background: var(--surf2); color: var(--muted); }
  .tag:hover { border-color: var(--jade-mid); color: var(--jade); }
  .tag.on { background: var(--jade-pale); color: var(--jade); border-color: var(--jade-mid); font-weight: 500; }

  /* SPINNER */
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--brd); border-top-color: var(--jade); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }

  /* ROW */
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 0; color: var(--faint); }

  /* FEEDBACK / MSG BOXES */
  .fb-box { margin-top: 10px; padding: 10px 12px; border-radius: 8px; background: var(--jade-pale); border: 1px solid var(--jade-mid); font-size: 12px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
  .fb-box .fb-lbl { color: var(--jade); font-size: 11px; font-weight: 600; display: block; margin-bottom: 4px; }
  .msg-box { padding: 10px 12px; border-radius: 8px; background: var(--gold-pale); border: 1px solid var(--gold-border); font-size: 12px; color: var(--tx); line-height: 1.7; white-space: pre-wrap; }

  /* ERROR */
  .err { color: #6B1828; font-size: 12px; padding: 10px 12px; border-radius: 6px; background: var(--rose-pale); border: 1px solid var(--rose-border); margin-bottom: 10px; }

  /* POMODORO */
  #pom-svg { transform: rotate(-90deg); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--cream-border); border-radius: 3px; }

  /* PROFILE PANEL */
  #profile-panel {
    position: fixed; top: 0; right: -620px; width: 600px; height: 100vh;
    background: var(--surf); border-left: 1px solid var(--brd);
    z-index: 1000; transition: right .3s ease; overflow-y: auto;
    display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(42,95,82,.08);
  }
  #profile-panel.open { right: 0; }
  #profile-overlay { display: none; position: fixed; inset: 0; background: rgba(30,61,51,.35); z-index: 999; }
  #profile-overlay.open { display: block; }
  .profile-header { padding: 16px 20px; border-bottom: 1px solid var(--brd); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surf); z-index: 1; }
  .profile-body { padding: 20px; flex: 1; }
  .profile-section-head { font-size: 11px; color: var(--jade); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; margin-top: 16px; }
  .profile-body p { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .profile-streaming { font-size: 12px; color: var(--muted); line-height: 1.8; white-space: pre-wrap; }
  .profile-loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; padding: 20px 0; }

  /* SETTINGS */
  #settings-screen { max-width: 500px; margin: 0 auto; }

  /* STAGE FILTERS */
  .stage-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
</style>
</head>
<body>

<div id="profile-overlay" onclick="closeProfilePanel()"></div>
<div id="profile-panel">
  <div class="profile-header">
    <div>
      <div id="profile-panel-title" style="font-size:14px;font-weight:500;color:var(--tx)">Company Profile</div>

    </div>

      <button id="profile-copy-btn" onclick="copyProfile()" style="font-size:11px;display:none">Copy</button>
      <button onclick="closeProfilePanel()" style="font-size:18px;border:none;background:none;color:var(--muted);padding:4px 8px">×</button>
    </div>
  </div>
  <div class="profile-body">
    <div id="profile-panel-content"></div>
  </div>
</div>

<div id="nav">
  <div class="brand">

        <path d="M11 21L21 11" stroke="#C9961A" stroke-width="2.6" stroke-linecap="round"/>

      <button class="active" onclick="showTab('board')" id="tab-board">Job board</button>

</div>

<div id="main">

  <div id="pane-tracker" style="display:none"></div>
  <div id="pane-tasks" style="display:none"></div>
  <div id="pane-pomodoro" style="display:none"></div>
  <div id="pane-network" style="display:none"></div>
  <div id="pane-referrals" style="display:none"></div>
  <div id="pane-targets" style="display:none"></div>
  <div id="pane-sync" style="display:none"></div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────

const PROFILE = `Senior PM · Digital Health · Behavioral Health Analytics · Care Navigation · 0-1 Product Builds · MBA (Medical Industry, UMN Carlson) · BS Biomedical Sciences · Minneapolis MN · Remote-first · $120K–$160K target · 5+ yrs experience`;

// Each preset runs 2-3 query variants in parallel and merges results
const PRESETS = [
  {l:'PM – Digital Health',        qs:['"product manager" "digital health"', 'product manager healthtech healthcare remote', '"senior product manager" health technology']},
  {l:'Sr PM – Care Navigation',    qs:['"product manager" "care navigation"', '"product manager" "care coordination" health', 'product manager navigation "health plan"']},
  {l:'PM – Behavioral Health',     qs:['"product manager" "behavioral health"', '"product manager" "mental health" technology', 'product manager EAP "employee assistance"']},
  {l:'PM – Value-Based Care',      qs:['"product manager" "value-based care"', '"product manager" "population health"', 'product manager "risk adjustment" healthcare']},
  {l:'PM – Health Analytics',      qs:['"product manager" "healthcare analytics"', '"product manager" "health data" platform', 'product manager "clinical analytics" OR "claims data"']},
  {l:'PM – Patient Engagement',    qs:['"product manager" "patient engagement"', '"product manager" "patient experience" digital', 'product manager "member engagement" health']},
  {l:'PM – Telehealth',            qs:['"product manager" telehealth', '"product manager" "virtual care"', 'product manager telemedicine remote digital']},

const COMPANY_CATEGORIES = {
  'Healthcare Startups': ['unite us','reema health','oasis health','included health','transcarent','spring health','lyra health','modern health','develop health','accolade','gravie','omada','cityblock','arcadia','aledade','innovaccer','komodo','datavant','particle health','health catalyst','nomi health','turquoise','oscar health','inovalon'],
  'Healthcare Enterprise': ['unitedhealthgroup','uhg','optum','surest','cvs','aetna','cigna','evernorth','humana','elevance','prime therapeutics','novu health','anthem'],
  'Medtech Enterprise': ['medtronic','boston scientific','bsc','abbott','stryker'],
  'Medtech Startups': ['anteris','nalu','cardiovalve','shockwave','penumbra'],
};

function detectCategory(company) {
  if (!company) return '';
  const lower = company.toLowerCase();
  for (const [cat, keywords] of Object.entries(COMPANY_CATEGORIES)) {
    if (keywords.some(k => lower.includes(k))) return cat;
  }
  return '';
}

const CAT_COLORS = {
  'Healthcare Startups': {bg:'var(--teal-bg)',color:'var(--teal)',border:'var(--teal-dim)'},
  'Healthcare Enterprise': {bg:'var(--blue-bg)',color:'var(--blue)',border:'#B5D4F4'},
  'Medtech Enterprise': {bg:'var(--rose-pale)',color:'var(--rose)',border:'var(--rose-border)'},
  'Medtech Startups': {bg:'var(--purple-bg)',color:'#4A2870',border:'#C4A8E8'},
};
const STAGES = ['Saved','Coffee / Networking','Applied','Phone Screen','Interview','Final Round','Offer','Rejected','Ghosted'];
const STAGE_COL = {Saved:'purple',Applied:'blue','Coffee / Networking':'teal','Phone Screen':'amber',Interview:'amber','Final Round':'green',Offer:'green',Rejected:'red',Ghosted:'purple'};
const STAGE_CARD_BG = {
  Saved:'var(--card-saved)', Applied:'var(--card-applied)',
  'Coffee / Networking':'var(--card-coffee)',
  'Phone Screen':'var(--card-screen)', Interview:'var(--card-interview)',
  'Final Round':'var(--card-offer)', Offer:'var(--card-offer)',
  Rejected:'var(--card-rejected)', Ghosted:'var(--card-ghosted)',
};

const POM_TASKS = [
  'Search 3 new job boards','Tailor resume for a role','Write a cover letter',
  'Send 2 networking messages','Research a target company','Update application tracker',
  'Prep 5 interview answers','Follow up on an application','Review job alerts','Update LinkedIn',
];

const REL_COL = {Warm:'amber',Alumni:'blue',Cold:'purple',Recruiter:'green'};

// ── DEFAULT DATA ──────────────────────────────────────────────────────────────

const DEFAULT_APPS = [
  {id:1,company:'Enliven Health (Omnicell)',role:'PM – Clinical Solutions',stage:'Applied',priority:'High',date:'2026-04-30',salary:'$125–150K',notes:'Clinical pharmacy tech'},

  {id:6,company:'H1 Provider Intelligence',role:'Sr. PM – Digital Health Data',stage:'Saved',priority:'High',date:'',salary:'$130–155K',notes:'Open until Jun 24'},

const DEFAULT_CONTACTS = [
  {id:1,name:'Clare MesserSchmidt',company:'Oasis Health Partners',role:'Recruiter',rel:'Warm',last:'2026-04-26',next:'2026-05-10',notes:'Strong connection, future roles likely'},
  {id:2,name:'Greg Seely',company:'ABOUT Healthcare',role:'Alumni',rel:'Alumni',last:'2026-03-04',next:'2026-05-15',notes:'Outreach sent 3/4/26'},

  // Cloud credentials (persisted to localStorage — device-only, not synced)

    {id:6,  text:'Follow up on Vori Health application',              done:false, cat:'followup',due:'2026-05-07', priority:'high'},
    {id:7,  text:'Message Dave Moen re: Reema Health intro',          done:false, cat:'network', due:'2026-05-12', priority:'high'},
    {id:8,  text:'Sign up for UHG talent community',                  done:false, cat:'search',  due:'',           priority:'medium'},
    {id:9,  text:'Sign up for CVS/Aetna talent community',            done:false, cat:'search',  due:'',           priority:'medium'},
    {id:10, text:'Sign up for Medtronic talent community',            done:false, cat:'search',  due:'',           priority:'medium'},
    {id:11, text:'Sign up for BSC talent community',                  done:false, cat:'search',  due:'',           priority:'medium'},
    {id:12, text:'Map LinkedIn 1st-degree contacts at target cos.',   done:false, cat:'network', due:'',           priority:'medium'},
    {id:13, text:'Tailor resume for Oasis Health role',               done:false, cat:'apply',   due:'2026-05-06', priority:'high'},
    {id:14, text:'Search Wellfound + Remotive for new PM roles',      done:false, cat:'search',  due:'2026-05-06', priority:'medium'},
    {id:15, text:'Update LinkedIn headline + featured section',       done:false, cat:'profile',  due:'',           priority:'low'},
  ],
  taskFilter: 'all',
  taskShowAdd: false,
  referrals: JSON.parse(localStorage.getItem('referrals')||'null') || [

// ── JSONBIN CLOUD SYNC ────────────────────────────────────────────────────────

const JB_URL = 'https://api.jsonbin.io/v3/b';

function jbHeaders(extra={}) {
  return { 'Content-Type': 'application/json', 'X-Master-Key': state.jbKey, ...extra };
}

// Create a new bin — called once during first-time setup
async function jbCreate() {
  const payload = { apps: state.apps, contacts: state.contacts, version: 1 };
  const resp = await fetch(JB_URL, {
    method: 'POST',
    headers: { ...jbHeaders(), 'X-Bin-Name': 'ryans-hunt-2026', 'X-Bin-Private': 'true' },
    body: JSON.stringify(payload)
  });
  if (!resp.ok) { const e = await resp.text(); throw new Error(`Create failed ${resp.status}: ${e.slice(0,200)}`); }
  const data = await resp.json();
  return data.metadata.id;
}

// Read latest data from bin
async function jbRead() {
  const resp = await fetch(`${JB_URL}/${state.jbBin}/latest`, {
    headers: jbHeaders({ 'X-Bin-Meta': 'false' })
  });
  if (!resp.ok) throw new Error(`Read failed ${resp.status}`);
  return resp.json(); // returns the record directly when X-Bin-Meta: false
}

// Write current apps+contacts+tasks+referrals to bin (debounced)
async function jbWrite() {
  if (!state.jbKey || !state.jbBin) return;
  const payload = {
    apps: state.apps, contacts: state.contacts,
    tasks: state.tasks, referrals: state.referrals,
    version: 2, updatedAt: new Date().toISOString()
  };
  const resp = await fetch(`${JB_URL}/${state.jbBin}`, {
    method: 'PUT', headers: jbHeaders(), body: JSON.stringify(payload)
  });
  if (!resp.ok) throw new Error(`Write failed ${resp.status}`);
}

// ── PERSISTENCE ───────────────────────────────────────────────────────────────

// Always save credentials to localStorage (device-level, intentionally local)
function saveCredentials() {
  if (state.jbKey)     localStorage.setItem('jb_key',      state.jbKey);
  if (state.jbBin)     localStorage.setItem('jb_bin',      state.jbBin);
  if (state.adzunaId)  localStorage.setItem('adzuna_id',   state.adzunaId);
  if (state.adzunaKey) localStorage.setItem('adzuna_key',  state.adzunaKey);
}

// Debounced cloud save — batches rapid changes into one write, 1.5s after last change
function save() {
  saveCredentials();
  // Always persist tasks/referrals locally (fast, no cloud needed)
  localStorage.setItem('tasks', JSON.stringify(state.tasks));
  localStorage.setItem('referrals', JSON.stringify(state.referrals));
  if (!state.jbKey || !state.jbBin) {
    localStorage.setItem('apps_backup', JSON.stringify(state.apps));
    localStorage.setItem('contacts_backup', JSON.stringify(state.contacts));
    return;
  }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncStatus('saving…', false);
    try {
      await jbWrite();
      setSyncStatus('✓ synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), false);
    } catch(e) {
      setSyncStatus('⚠ sync failed — ' + e.message, true);
    }
  }, 1500);
}

function setSyncStatus(msg, isError) {
  state.cloudStatus = msg; state.cloudError = isError;
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = isError ? 'var(--red)' : 'var(--green)'; }
}

// Load data from JSONBin on startup
async function loadFromCloud() {
  if (!state.jbKey || !state.jbBin) {
    // No cloud configured — try localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    const contactsBackup = localStorage.getItem('contacts_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
    if (contactsBackup) state.contacts = JSON.parse(contactsBackup);
    return;
  }
  try {
    const data = await jbRead();
    if (data.apps)    state.apps    = data.apps;
    if (data.contacts) state.contacts = data.contacts;
    setSyncStatus('✓ loaded from cloud', false);
  } catch(e) {
    setSyncStatus('⚠ cloud load failed — using local data', true);
    // Fall back to localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
  }
}

// Use relative /api/claude proxy unless running as a local file (file://)
// This works on any Netlify domain including preview/branch deploys
const CLAUDE_URL = '/api/claude';
function getApiKey() { return localStorage.getItem('anthropic_api_key') || ''; }

async function claudeStream(prompt, onChunk) {
  const key = getApiKey();
  if (!key) { showToast('Add your Anthropic API key in the Excel sync tab first'); return ''; }
  const resp = await fetch(CLAUDE_URL, {
    method:'POST', headers:{'Content-Type':'application/json','x-user-api-key':key},
    body: JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,stream:true,messages:[{role:'user',content:prompt}]})
  });
  const reader = resp.body.getReader(), dec = new TextDecoder();
  let full = '';
  while(true) {
    const {done,value} = await reader.read(); if(done) break;
    for(const line of dec.decode(value).split('\n').filter(l=>l.startsWith('data: '))) {
      try { const j=JSON.parse(line.slice(6)); if(j.delta?.text){full+=j.delta.text;onChunk?.(full);} } catch{}
    }
  }
  return full;
}

async function claudeJSON(prompt) {
  const key = getApiKey();
  if (!key) { showToast('Add your Anthropic API key in the Excel sync tab first'); return []; }
  const resp = await fetch(CLAUDE_URL, {
    method:'POST', headers:{'Content-Type':'application/json','x-user-api-key':key},
    body: JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,messages:[{role:'user',content:prompt}]})
  });
  const data = await resp.json();
  const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
  const s=text.indexOf('['),e=text.lastIndexOf(']');
  if(s===-1||e===-1) return [];
  return JSON.parse(text.slice(s,e+1));
}

}

    if(f.type==='stage') {
      const field = `<div>${lbl(f.label)}${sel(`${prefix}-stage`,STAGES,app.stage||'Saved')}</div>`;
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
      continue;
    }
    if(f.type==='priority') {
      const field = `<div>${lbl(f.label)}${sel(`${prefix}-priority`,['High','Medium','Low'],app.priority||'High')}</div>`;
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
      continue;
    }
    const field = `<div>${lbl(f.label)}${inp(`${prefix}-${f.key}`,app[f.key]||'',f.ph)}</div>`;
    if(!f.half) {
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}<div></div></div>`); leftover=null; }
      pairs.push(`<div style="margin-bottom:8px">${lbl(f.label)}${inp(`${prefix}-${f.key}`,app[f.key]||'',f.ph)}</div>`);
    } else {
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
    }
  }
  if(leftover) pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}<div></div></div>`);
  return pairs.join('');
}

function readAppForm(prefix) {
  const get = k => { const el=document.getElementById(`${prefix}-${k}`); return el?el.value.trim():''; };
  const obj = {};
  APP_FORM_FIELDS.forEach(f => { obj[f.key] = get(f.key); });
  obj.stage    = get('stage');
  obj.priority = get('priority');
  return obj;
}

function renderTracker(el) {
  const ACTIVE_STAGES = ['Saved','Coffee / Networking','Applied','Phone Screen','Interview','Final Round','Offer'];
  const HIDDEN_STAGES = ['Rejected','Ghosted'];

  // Category filter
  let list = state.apps.map(a => ({...a, _cat: a.category || detectCategory(a.company)}));

  // Stage filter (hide ghosted/rejected by default unless explicitly selected)
  if (state.appFilter === 'all') {
    list = list.filter(a => !HIDDEN_STAGES.includes(a.stage));
  } else if (state.appFilter === 'hidden') {
    list = list.filter(a => HIDDEN_STAGES.includes(a.stage));
  } else {
    list = list.filter(a => a.stage === state.appFilter);

  // Category filter
  if (state.appCatFilter && state.appCatFilter !== 'all') {
    list = list.filter(a => a._cat === state.appCatFilter);

  // Sort
  if (state.appSort === 'updated') list.sort((a,b) => (b.updatedAt||b.date||'').localeCompare(a.updatedAt||a.date||''));
  else if (state.appSort === 'date') list.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  else if (state.appSort === 'priority') { const p={High:3,Medium:2,Low:1}; list.sort((a,b)=>(p[b.priority]||0)-(p[a.priority]||0)); }

  const counts = STAGES.reduce((acc,s)=>({...acc,[s]:state.apps.filter(x=>x.stage===s).length}),{});
  const activeCount = state.apps.filter(a=>!HIDDEN_STAGES.includes(a.stage)).length;

  // Top 5 priorities

    .filter(a => a.priority === 'High' && !HIDDEN_STAGES.includes(a.stage))

  const stageFilterBtns = [
    {v:'all', l:`Active (${activeCount})`},

function togglePriority(id) {
  state.apps = state.apps.map(a => a.id===id ? {...a, priority: a.priority==='High'?'Medium':'High', updatedAt: new Date().toISOString()} : a);
  save(); render('tracker');
}

function updateAppField(id, field, val) {
  state.apps = state.apps.map(a => a.id===id ? {...a, [field]:val, updatedAt:new Date().toISOString()} : a);
  save();
}

function showCatOverride(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  const current = app.category || detectCategory(app.company) || '';
  const modal = document.getElementById('cat-override-modal');
  if (!modal) return;
  modal.innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center" onclick="document.getElementById('cat-override-modal').innerHTML=''">
      <div style="background:var(--surf);border-radius:10px;padding:20px;min-width:240px;border:1px solid var(--brd2)" onclick="event.stopPropagation()">
        <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:12px">Set category for ${esc(app.company)}</div>
        ${['Healthcare Startups','Healthcare Enterprise','Medtech Enterprise','Medtech Startups',''].map(c=>
          `<button onclick="setCat(${id},'${c}')" style="display:block;width:100%;margin-bottom:6px;text-align:left;padding:7px 12px;font-size:12px;${c===current?'background:var(--jade-pale);color:var(--jade);border-color:var(--jade-mid)':''}">${c||'Clear category'}</button>`
        ).join('')}
        <button onclick="document.getElementById('cat-override-modal').innerHTML=''" style="font-size:11px;color:var(--faint);border-color:transparent;width:100%;margin-top:4px">Cancel</button>
      </div>
    </div>`;
}

function setCat(id, cat) {
  state.apps = state.apps.map(a => a.id===id ? {...a, category:cat, updatedAt:new Date().toISOString()} : a);
  save(); render('tracker');
}

function setAppFilter(f) { state.appFilter=f; state.appEditing=null; render('tracker'); }

function setAppStage(id,stage) {
  state.apps=state.apps.map(a=>a.id===id?{...a,stage,updatedAt:new Date().toISOString()}:a);
  save(); render('tracker');
}

function delApp(id) {
  if(confirm('Remove this application?')) { state.apps=state.apps.filter(a=>a.id!==id); save(); render('tracker'); }
}

function addApp() {
  const fields = readAppForm('add');
  if(!fields.company) return;
  state.apps.push({ id: Date.now(), ...fields, updatedAt: new Date().toISOString() });
  state.appShowAdd=false; save(); render('tracker');
}

function saveEdit(id) {
  const fields = readAppForm(`e-${id}`);
  state.apps = state.apps.map(a => a.id===id ? { ...a, ...fields, updatedAt: new Date().toISOString() } : a);
  state.appEditing=null; save(); render('tracker');
}

function copyPrepPrompt(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  const text = `Company: ${app.company}\nRole: ${app.role||''}\nStage: ${app.stage}\nMy background: Senior PM, digital health, behavioral health analytics at Aetna/CVS (care navigation platform Access Plus, 0-1 launch, double-digit NPS improvement), MBA Medical Industry Leadership UMN Carlson, BS Biomedical Sciences (Visible Heart Lab cardiac research), Minneapolis MN.\nNotes: ${app.gaps||app.notes||''}\n\nPlease produce a structured interview prep guide for this role.`;
  navigator.clipboard?.writeText(text);
  const t=document.createElement('div');
  t.textContent='📋 Prep prompt copied — paste in Claude chat';
  Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'var(--blue-bg)',border:'1px solid var(--blue)',color:'var(--blue)',padding:'8px 18px',borderRadius:'8px',fontSize:'12px',zIndex:'9999'});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// ── COMPANY PROFILE PANEL ─────────────────────────────────────────────────────

function openProfilePanel(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  state.profilePanelApp = app;
  state.profilePanelText = '';

  document.getElementById('profile-panel-title').textContent = app.company;
  document.getElementById('profile-panel-sub').textContent = app.role || '';
  document.getElementById('profile-copy-btn').style.display = 'none';
  document.getElementById('profile-panel-content').innerHTML =
    `<div class="profile-loading"><span class="spin"></span>Researching ${esc(app.company)}…</div>`;
  document.getElementById('profile-panel').classList.add('open');
  document.getElementById('profile-overlay').classList.add('open');
  buildProfile(app);
}

function closeProfilePanel() {
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('profile-overlay').classList.remove('open');
}

async function buildProfile(app) {
  const prompt = `You are a company research assistant preparing Ryan Corcoran for a job application or coffee meeting. Ryan: Senior PM, digital health, behavioral health analytics at Aetna/CVS, care navigation platform (0-1 launch), MBA Medical Industry Leadership (UMN Carlson), BS Biomedical Sciences (Visible Heart Lab), Minneapolis MN.

Company: ${app.company}
Role: ${app.role || 'Product Manager'}
Stage: ${app.stage}
Context: ${app.gaps || app.notes || ''}

Use web search to research this company. Produce a concise, scannable profile:

**🏢 Snapshot** — what they do, size, stage (startup/PE/public), HQ, founded
**💰 Business model** — how they make money, revenue or funding if known
**🛍️ Products** — core product(s), who they serve, key features
**🎯 Strategic position** — top 2-3 competitors with one-line differentiator each
**📈 Tailwinds** — 2-3 macro trends they are riding
**📰 Recent news** — last 6 months, anything relevant to this role
**🗣️ Talking points** — 4-5 specific points bridging Ryan's background to this company (use real numbers and product names)
**📊 Numbers to know** — 5-8 key stats to have memorized
**❓ Smart questions to ask** — 3 specific questions tailored to this stage (${app.stage})

Be specific throughout. If PE-backed, flag what that means strategically. Flag if the company has had recent layoffs or funding challenges.`;

  try {
    await claudeStream(prompt, t => {
      state.profilePanelText = t;
      const content = document.getElementById('profile-panel-content');
      if(!content) return;
      const html = t
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--tx)">$1</strong>')
        .replace(/^(#{1,3}) (.+)$/gm, (_,h,txt) => `<div class="profile-section-head" style="margin-top:${h.length===1?'0':'14px'}">${txt}</div>`)
        .replace(/^[-•] (.+)$/gm, '<div style="padding:2px 0 2px 10px;color:var(--muted);font-size:12px;line-height:1.7;border-left:2px solid var(--brd);margin:2px 0">$1</div>')
        .split('\n').map(line => line.startsWith('<')||!line.trim() ? line : `<p style="font-size:12px;color:var(--muted);line-height:1.7;margin:3px 0">${line}</p>`).join('\n');
      content.innerHTML = html;
    });
    document.getElementById('profile-copy-btn').style.display = 'block';
  } catch(e) {
    const content = document.getElementById('profile-panel-content');
    if(content) content.innerHTML = `<div style="color:var(--red);font-size:12px;padding:10px">Profile generation failed: ${esc(e.message)}<br><br>Make sure your Anthropic API key is set in Netlify environment variables.</div>`;
  }
}

function copyProfile() {
  navigator.clipboard?.writeText(state.profilePanelText);
  const btn = document.getElementById('profile-copy-btn');
  if(btn){ btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',1500); }
}


// ── POMODORO ──────────────────────────────────────────────────────────────────

function renderPomodoro(el) {
  const cur = [{key:'focus',label:'Focus',mins:25,col:'var(--amber)'},{key:'short',label:'Short break',mins:5,col:'var(--green)'},{key:'long',label:'Long break',mins:15,col:'var(--blue)'}][state.pomMode];
  const R=80, Circ=2*Math.PI*R, pct=state.pomSecs/state.pomTotal;
  const mm=String(Math.floor(state.pomSecs/60)).padStart(2,'0'), ss=String(state.pomSecs%60).padStart(2,'0');

  const taskBtns = POM_TASKS.map(t => `<button class="tag ${state.pomTask===t&&!state.pomCustomTask?'on':''}" onclick="setPomTask('${esc(t)}')">${esc(t)}</button>`).join('');

  const logRows = state.pomLog.slice(-6).reverse().map(l =>
    `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px"><span>${esc(l.task)}</span><span style="color:var(--faint)">${l.time} · ${l.mins}m</span></div>`
  ).join('');

  const dots = [...Array(4)].map((_,i) => `<div style="width:14px;height:14px;border-radius:50%;background:${i<(state.pomSessions%4)?'var(--amber)':'var(--surf)'};border:1px solid var(--brd)"></div>`).join('');

  el.innerHTML = secHead('Focus timer') + `
    <div class="row" style="margin-bottom:20px">
      ${[{l:'Focus',c:'var(--amber)'},{l:'Short break',c:'var(--green)'},{l:'Long break',c:'var(--blue)'}].map((m,i)=>`<button onclick="switchPomMode(${i})" style="flex:1;color:${state.pomMode===i?m.c:'var(--muted)'};border-color:${state.pomMode===i?m.c:'var(--brd)'}">${m.l}</button>`).join('')}
    </div>
    <div style="display:flex;justify-content:center;margin-bottom:20px">
      <div style="position:relative;width:200px;height:200px">
        <svg id="pom-svg" width="200" height="200">
          <circle cx="100" cy="100" r="${R}" fill="none" stroke="var(--surf)" stroke-width="8"/>
          <circle cx="100" cy="100" r="${R}" fill="none" stroke="${cur.col}" stroke-width="8" stroke-dasharray="${Circ}" stroke-dashoffset="${Circ*(1-pct)}" stroke-linecap="round" style="transition:${state.pomRunning?'stroke-dashoffset 1s linear':'none'}"/>
        </svg>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:42px;font-weight:500;letter-spacing:-2px;color:var(--tx)">${mm}:${ss}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${cur.label}</div>
        </div>
      </div>
    </div>
    <div class="row" style="justify-content:center;margin-bottom:16px">
      <button class="${state.pomRunning?'':'amber'}" style="min-width:90px;font-size:13px" onclick="togglePom()">${state.pomRunning?'Pause':state.pomSecs===state.pomTotal?'Start':'Resume'}</button>
      <button style="font-size:13px" onclick="resetPom()">Reset</button>
    </div>
    <div class="row" style="margin-bottom:16px">
      ${inp('pom-custom',state.pomCustomMins,'Custom duration (mins)','flex:1')}
      <button onclick="applyPomCustom()">Set</button>
    </div>
    <div class="card" style="margin-bottom:12px">
      ${lbl('Current task')}
      <div class="tag-row" style="margin-top:8px">${taskBtns}</div>
      ${inp('pom-task-custom',state.pomCustomTask,'Or type a custom task…')}
    </div>
    <div class="row" style="margin-bottom:${state.pomLog.length?'12px':'0'}">${dots}<span style="font-size:12px;color:var(--muted)">${state.pomSessions} session${state.pomSessions!==1?'s':''} today</span></div>
    ${state.pomLog.length?`<div class="card">${lbl('Today\'s log')}${logRows}</div>`:''}
  `;
  document.getElementById('pom-custom').addEventListener('input',e=>state.pomCustomMins=e.target.value);
  document.getElementById('pom-task-custom').addEventListener('input',e=>{ state.pomCustomTask=e.target.value; if(e.target.value) state.pomTask=''; });
}

function switchPomMode(i) {
  clearInterval(pomInterval); pomInterval=null;
  const mins=[25,5,15][i];
  state.pomMode=i; state.pomRunning=false; state.pomTotal=mins*60; state.pomSecs=mins*60;
  render('pomodoro');
}

function togglePom() {
  if(state.pomRunning) { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; }
  else {
    state.pomRunning=true;
    pomInterval=setInterval(()=>{
      state.pomSecs--;
      if(state.pomSecs<=0) {
        clearInterval(pomInterval); pomInterval=null; state.pomRunning=false;
        if(state.pomMode===0) {
          state.pomSessions++;
          state.pomLog.push({task:state.pomCustomTask||state.pomTask,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),mins:[25,5,15][state.pomMode]});
        }
        state.pomSecs=0;
      }
      render('pomodoro');
    },1000);
  }
  render('pomodoro');
}

function resetPom() { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; state.pomSecs=state.pomTotal; render('pomodoro'); }

function applyPomCustom() {
  const m=parseInt(document.getElementById('pom-custom').value);
  if(!m||m<1||m>120) return;
  clearInterval(pomInterval); pomInterval=null;
  state.pomRunning=false; state.pomTotal=m*60; state.pomSecs=m*60; state.pomCustomMins='';
  render('pomodoro');
}

function setPomTask(t) { state.pomTask=t; state.pomCustomTask=''; render('pomodoro'); }

function renderNetwork(el) {

    const isEditing = state.netEditing === c.id;

    if (isEditing) {
      return `<div class="card" style="margin-bottom:8px;border-left:3px solid var(--amber)">
        <div style="font-size:12px;font-weight:500;color:var(--amber);margin-bottom:10px">Editing: ${esc(c.name)}</div>
        <div class="g2" style="margin-bottom:8px;gap:8px">
          <div>${lbl('Name')}${inp('net-edit-name',c.name,'Name')}</div>
          <div>${lbl('Company')}${inp('net-edit-co',c.company,'Company')}</div>
          <div>${lbl('Their role')}${inp('net-edit-role',c.role||'','Their role')}</div>
          <div>${lbl('Relationship')}${sel('net-edit-rel',['Warm','Alumni','Cold','Recruiter'],c.rel||'Warm')}</div>
          <div>${lbl('Last contact')}${inp('net-edit-last',c.last||'','YYYY-MM-DD')}</div>
          <div>${lbl('Next follow-up')}${inp('net-edit-next',c.next||'','YYYY-MM-DD')}</div>
        </div>
        <div style="margin-bottom:8px">${lbl('Notes')}${inp('net-edit-notes',c.notes||'','How you know them, recent interaction...')}</div>
        <div class="row" style="margin-top:8px">
          <button class="amber" onclick="saveContactEdit(${c.id})">Save</button>
          <button onclick="state.netEditing=null;render('network')">Cancel</button>
        </div>
      </div>`;
    }

    return `<div class="card" style="margin-bottom:8px;border-left:3px solid ${brdCol};border-radius:0 10px 10px 0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div class="row" style="margin-bottom:3px;flex-wrap:wrap">
            <span style="font-size:14px;font-weight:600;color:var(--tx)">${esc(c.name)}</span>
            ${badge(c.rel,REL_COL[c.rel]||'amber')}
            ${ov?badge('follow up overdue','red'):''}${!ov&&sn?badge('due soon','amber'):''}
          </div>
          <div style="color:var(--muted);font-size:12px">${esc(c.role||'')} · ${esc(c.company||'')}</div>
          ${c.notes?`<div style="font-size:11px;color:var(--faint);margin-top:2px">${esc(c.notes)}</div>`:''}

function saveContactEdit(id) {
  state.contacts = state.contacts.map(c => c.id===id ? {
    ...c,
    name:    document.getElementById('net-edit-name')?.value.trim() || c.name,
    company: document.getElementById('net-edit-co')?.value.trim()   || c.company,
    role:    document.getElementById('net-edit-role')?.value.trim() || c.role,
    rel:     document.getElementById('net-edit-rel')?.value         || c.rel,
    last:    document.getElementById('net-edit-last')?.value        || c.last,
    next:    document.getElementById('net-edit-next')?.value        || c.next,
    notes:   document.getElementById('net-edit-notes')?.value       || c.notes,
  } : c);
  state.netEditing = null;
  save(); render('network');
}

function addContact() {
  const name=document.getElementById('net-name').value.trim(); if(!name)return;
  state.contacts.push({
    id:Date.now(), name,
    company: document.getElementById('net-co').value,
    role:    document.getElementById('net-role').value,
    rel:     document.getElementById('net-rel').value,
    last:    document.getElementById('net-last').value,
    next:    document.getElementById('net-next').value,
    notes:   document.getElementById('net-notes').value,
  });
  state.netShowAdd=false; save(); render('network');
}

function copyNetPrompt(type, id) {
  const c = state.contacts.find(x=>String(x.id)===String(id)); if(!c) return;
  let prompt = '';
  if(type === 'linkedin') {
    prompt = `Write a short, warm LinkedIn connection message (3-4 sentences) from Ryan Corcoran to ${c.name}, who works as ${c.role||'a professional'} at ${c.company}. Ryan's background: Senior PM, digital health, behavioral health analytics at Aetna/CVS, care navigation platform (Access Plus, 0-1 launch), MBA Medical Industry Leadership (UMN Carlson), based in Minneapolis MN. Context about this contact: ${c.notes||'professional connection'}. Tone: genuine and specific, not generic. No subject line needed.`;
  } else if(type === 'followup') {
    prompt = `Write a brief follow-up message (2-3 sentences) from Ryan Corcoran to ${c.name} at ${c.company}. Last touch: ${c.last||'recently'}. Context: ${c.notes||'reconnecting after previous conversation'}. Ryan's background: Senior PM, digital health, Aetna/CVS behavioral health analytics, Minneapolis MN. Keep it warm and easy to respond to.`;
  } else if(type === 'intro') {
    prompt = `Write a concise, warm referral request message (4-5 sentences) from Ryan Corcoran to ${c.name}, who works at ${c.company}. Ryan is actively looking for Senior PM / product leadership roles in digital health. His background: behavioral health analytics platform at Aetna/CVS, care navigation (0-1 launch), MBA Medical Industry Leadership (UMN), BS Biomedical Sciences. Context: ${c.notes||'professional connection'}. Ask if they'd be willing to refer him or flag any relevant openings. Tone: genuine, not transactional — acknowledge the relationship first.`;
  }
  navigator.clipboard?.writeText(prompt);
  const t = document.createElement('div');
  t.textContent = `📋 ${type==='linkedin'?'LinkedIn msg':type==='followup'?'Follow-up':'Referral ask'} prompt copied — paste in Claude chat`;
  Object.assign(t.style, {position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:getComputedStyle(document.documentElement).getPropertyValue('--jade-pale').trim(),border:`1px solid ${getComputedStyle(document.documentElement).getPropertyValue('--jade-mid').trim()}`,color:getComputedStyle(document.documentElement).getPropertyValue('--jade').trim(),padding:'8px 18px',borderRadius:'8px',fontSize:'12px',zIndex:'9999',fontFamily:'Avenir Next,system-ui,sans-serif'});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

const TASK_CATS = [
  {key:'all',     label:'All'},
  {key:'today',   label:'Today',     color:'var(--red)'},
  {key:'followup',label:'Follow-ups', color:'var(--amber)'},
  {key:'apply',   label:'Apply',     color:'var(--green)'},
  {key:'search',  label:'Search',    color:'var(--blue)'},
  {key:'network', label:'Network',   color:'var(--purple)'},
  {key:'profile', label:'Profile',   color:'var(--muted)'},
  {key:'other',   label:'Other',     color:'var(--faint)'},
];

function renderTasks(el) {
  const today = new Date().toISOString().slice(0,10);
  const filtered = state.taskFilter === 'all'
    ? state.tasks.filter(t=>!t.done)
    : state.taskFilter === 'done'
      ? state.tasks.filter(t=>t.done)
      : state.tasks.filter(t=>t.cat===state.taskFilter && !t.done);

  const pending  = state.tasks.filter(t=>!t.done).length;
  const overdue  = state.tasks.filter(t=>!t.done && t.due && t.due < today).length;
  const done     = state.tasks.filter(t=>t.done).length;

  const catBtns = [
    ...TASK_CATS,
    {key:'done', label:`Done (${done})`, color:'var(--faint)'}
  ].map(c =>
    `<button class="tag ${state.taskFilter===c.key?'on':''}" onclick="state.taskFilter='${c.key}';render('tasks')">${c.label}</button>`
  ).join('');

  const taskItems = filtered.map(t => {
    const cat = TASK_CATS.find(c=>c.key===t.cat);
    const isOverdue  = !t.done && t.due && t.due < today;
    const isDueSoon  = !t.done && t.due && t.due >= today && t.due <= new Date(Date.now()+2*86400000).toISOString().slice(0,10);
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:6px;background:${t.done?'transparent':isOverdue?'rgba(248,81,73,0.05)':'var(--surf)'};border:1px solid ${t.done?'var(--brd)':isOverdue?'var(--red)':isDueSoon?'var(--amber-dim)':'var(--brd)'};margin-bottom:6px;opacity:${t.done?'0.5':'1'}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" style="width:16px;height:16px;margin-top:1px;flex-shrink:0;accent-color:var(--amber);cursor:pointer">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:${t.done?'var(--faint)':'var(--tx)'};text-decoration:${t.done?'line-through':'none'};margin-bottom:3px">${esc(t.text)}</div>
        <div class="row" style="gap:6px">
          ${cat&&cat.key!=='all'?`<span style="font-size:10px;padding:1px 7px;border-radius:10px;border:1px solid var(--brd);color:${cat.color||'var(--faint)'}">${cat.label}</span>`:''}
          ${t.priority==='high'?`<span style="font-size:10px;color:var(--amber)">● high</span>`:''}
          ${t.due?`<span style="font-size:10px;color:${isOverdue?'var(--red)':isDueSoon?'var(--amber)':'var(--faint)'}">${isOverdue?'overdue · ':isDueSoon?'due soon · ':''}${t.due}</span>`:''}
        </div>
      </div>
      <button onclick="deleteTask(${t.id})" style="font-size:10px;padding:2px 6px;color:var(--faint);border-color:transparent;flex-shrink:0">✕</button>
    </div>`;
  }).join('');

  const addForm = state.taskShowAdd ? `
    <div class="card" style="margin-bottom:12px;border-color:var(--amber-dim)">
      <div style="margin-bottom:8px">${lbl('Task')}${inp('task-text','','What needs doing…')}</div>
      <div class="g2" style="margin-bottom:8px;gap:8px">
        <div>${lbl('Category')}${sel('task-cat',TASK_CATS.filter(c=>c.key!=='all').map(c=>({v:c.key,l:c.label})),'today')}</div>
        <div>${lbl('Priority')}${sel('task-pri',[{v:'high',l:'High'},{v:'medium',l:'Medium'},{v:'low',l:'Low'}],'medium')}</div>
      </div>
      <div style="margin-bottom:8px">${lbl('Due date (optional)')}${inp('task-due','','YYYY-MM-DD')}</div>
      <div class="row">
        <button class="amber" onclick="addTask()">Add task</button>
        <button onclick="state.taskShowAdd=false;render('tasks')">Cancel</button>
      </div>
    </div>` : '';

  el.innerHTML = secHead('Tasks') + `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:12px;color:var(--muted)">
        <span style="color:var(--tx);font-weight:500">${pending}</span> pending
        ${overdue?` · <span style="color:var(--red)">${overdue} overdue</span>`:''}
        ${done?` · <span style="color:var(--faint)">${done} done</span>`:''}
      </div>
      <div class="row" style="gap:6px">
        <button onclick="clearDoneTasks()" style="font-size:11px;color:var(--faint)">Clear done</button>
        <button class="amber" onclick="state.taskShowAdd=!state.taskShowAdd;render('tasks')">+ Add task</button>
      </div>
    </div>
    ${addForm}
    <div class="tag-row">${catBtns}</div>
    ${taskItems || '<div class="empty">No tasks here. Nice work — or add some above.</div>'}
  `;
}

function toggleTask(id) {
  state.tasks = state.tasks.map(t => t.id===id ? {...t,done:!t.done} : t);
  save(); render('tasks');
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id!==id);
  save(); render('tasks');
}

function clearDoneTasks() {
  if(!confirm('Remove all completed tasks?')) return;
  state.tasks = state.tasks.filter(t => !t.done);
  save(); render('tasks');
}

function addTask() {
  const text = document.getElementById('task-text')?.value.trim();
  if(!text) return;
  state.tasks.push({
    id: Date.now(), text, done: false,
    cat:      document.getElementById('task-cat')?.value  || 'other',
    priority: document.getElementById('task-pri')?.value  || 'medium',
    due:      document.getElementById('task-due')?.value  || '',
  });
  state.taskShowAdd = false;
  save(); render('tasks');
}

const APP_COLS  = ['Company','Role Title','Salary Range','Location / Remote','Date Applied','Stage','Priority','Fit Score','Key Requirement Match','Gaps / Notes','Next Step','Next Step Date','Recruiter / Contact','Link / Source','Networking Contact','Relationship / Status'];
const APP_KEYS  = ['company','role','salary','location','date','stage','priority','fit','keyReqs','gaps','nextStep','nextDate','contact','source','netContact','netRel'];
const NET_COLS  = ['Company','Role','Alumni Contact','Relationship','Last Touch','Next Touch','Status','Notes'];
const NET_KEYS  = ['company','role','name','rel','last','next','status','notes'];

function csvEscape(v) {
  const s = String(v == null ? '' : v);
  return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
}

function toCSV(rows, cols) {
  return [cols.join(','), ...rows.map(r => APP_KEYS.map ? r : r)].join('\n');
}

function appsToCSV() {
  const header = APP_COLS.join(',');
  const rows = state.apps.map(a =>
    APP_KEYS.map(k => csvEscape(a[k]||'')).join(',')
  );
  return [header, ...rows].join('\n');
}

function contactsToCSV() {
  const header = NET_COLS.join(',');
  const rows = state.contacts.map(c =>
    NET_KEYS.map(k => csvEscape(c[k]||'')).join(',')
  );
  return [header, ...rows].join('\n');
}

function downloadCSV(content, filename) {
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => { obj[h.trim()] = (vals[i]||'').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
    else if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

function importAppsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, skipped:0, msg:'No rows found in file.'};

  // Try to detect column mapping — accepts both exact Excel headers and app-internal keys
  const colMap = {};
  const firstRow = rows[0];
  const allHeaders = Object.keys(firstRow);

  // Map Excel column names → internal keys
  const excelToKey = {};
  APP_COLS.forEach((col,i) => { excelToKey[col] = APP_KEYS[i]; });
  // Also accept lowercase/trimmed variants
  APP_COLS.forEach((col,i) => { excelToKey[col.toLowerCase()] = APP_KEYS[i]; });
  // Also accept direct key names
  APP_KEYS.forEach(k => { excelToKey[k] = k; excelToKey[k.toLowerCase()] = k; });

  // Build per-row mapping
  const headerMap = {}; // header name → internal key
  allHeaders.forEach(h => {
    const key = excelToKey[h] || excelToKey[h.trim().toLowerCase()];
    if(key) headerMap[h] = key;
  });

  if(!headerMap['Company'] && !headerMap['company']) {
    return {count:0, skipped:0, msg:`Could not find a "Company" column. Headers found: ${allHeaders.slice(0,5).join(', ')}…`};
  }

  let added=0, skipped=0, updated=0;
  const existingCos = state.apps.map(a=>a.company.toLowerCase().trim());

  rows.forEach(row => {
    const mapped = {};
    Object.entries(headerMap).forEach(([h,k]) => { mapped[k] = row[h]||''; });
    const co = (mapped.company||'').trim();
    if(!co) { skipped++; return; }

    const existIdx = existingCos.indexOf(co.toLowerCase());
    if(existIdx !== -1) {
      // Update existing — merge in any non-empty fields from CSV
      const existing = state.apps[existIdx];
      APP_KEYS.forEach(k => { if(mapped[k]) existing[k] = mapped[k]; });
      updated++;
    } else {
      state.apps.push({
        id: Date.now() + Math.random(),
        company: mapped.company||'',
        role: mapped.role||'',
        salary: mapped.salary||'',
        location: mapped.location||'',
        date: mapped.date||'',
        stage: mapped.stage||'Applied',
        priority: mapped.priority||'Medium',
        fit: mapped.fit||'',
        keyReqs: mapped.keyReqs||'',
        gaps: mapped.gaps||'',
        nextStep: mapped.nextStep||'',
        nextDate: mapped.nextDate||'',
        contact: mapped.contact||'',
        source: mapped.source||'',
        notes: mapped.notes||mapped.gaps||'',
      });
      added++;
    }
  });

  save();
  return {count:added, updated, skipped, msg:`Done — ${added} added, ${updated} updated, ${skipped} skipped (blank company).`};
}

function importContactsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, msg:'No rows found.'};
  let added=0, skipped=0;
  const existingNames = state.contacts.map(c=>c.name.toLowerCase().trim());
  rows.forEach(row => {
    const name = (row['Alumni Contact']||row['Name']||row['name']||'').trim();
    if(!name){skipped++;return;}
    if(existingNames.includes(name.toLowerCase())){skipped++;return;}
    state.contacts.push({
      id: Date.now()+Math.random(), name,
      company: row['Company']||row['company']||'',
      role: row['Role']||row['role']||'',
      rel: row['Relationship']||row['rel']||'Warm',
      last: row['Last Touch']||row['last']||'',
      next: row['Next Touch']||row['next']||'',
      notes: row['Notes']||row['notes']||'',
    });
    added++;
  });
  save();
  return {count:added, skipped, msg:`Done — ${added} contacts added, ${skipped} skipped.`};
}

async function doCloudSetup() {
  const key = document.getElementById('setup-jb-key').value.trim();
  if (!key) { document.getElementById('setup-error').textContent = 'Please enter your Master Key.'; return; }
  const btn = document.getElementById('setup-btn');
  btn.disabled = true; btn.textContent = 'Creating bin…';
  state.jbKey = key;
  try {
    const binId = await jbCreate();
    state.jbBin = binId;
    saveCredentials();
    document.getElementById('setup-error').textContent = '';
    showTab('board');
    setSyncStatus('✓ cloud connected · bin ' + binId.slice(0,8) + '…', false);
  } catch(e) {
    state.jbKey = '';
    document.getElementById('setup-error').textContent = 'Error: ' + e.message;
    btn.disabled = false; btn.textContent = 'Create my data bin →';
  }
}

async function doExistingSetup() {
  const key = document.getElementById('setup-existing-key').value.trim();
  const bin = document.getElementById('setup-existing-bin').value.trim();
  if (!key || !bin) { document.getElementById('setup-error').textContent = 'Enter both Master Key and Bin ID.'; return; }
  state.jbKey = key; state.jbBin = bin;
  try {
    const data = await jbRead();
    if (data.apps) state.apps = data.apps;
    if (data.contacts) state.contacts = data.contacts;
    saveCredentials();
    showTab('board');
    setSyncStatus('✓ reconnected · ' + state.apps.length + ' apps loaded', false);
  } catch(e) {
    state.jbKey = ''; state.jbBin = '';
    document.getElementById('setup-error').textContent = 'Could not connect: ' + e.message;
  }
}

function skipCloudSetup() {
  localStorage.setItem('cloud_skipped', '1');
  showTab('board');
}

function disconnectCloud() {
  if (!confirm('Disconnect cloud sync? Your data stays on this device but won\'t sync to other devices.')) return;
  state.jbKey = ''; state.jbBin = '';
  localStorage.removeItem('jb_key'); localStorage.removeItem('jb_bin');
  localStorage.removeItem('cloud_skipped');
  location.reload();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

async function init() {
  const hasCloud = state.jbKey && state.jbBin;
  const skipped  = localStorage.getItem('cloud_skipped');

  if (!hasCloud && !skipped) {
    // First run — show cloud setup screen overlaid on top of board pane
    const el = document.getElementById('pane-board');
    renderCloudSetup(el);
    return;
  }

  if (hasCloud) {
    setSyncStatus('loading…', false);
    await loadFromCloud();
  }

  render('board');
}

function saveApiKey() {
  const val = (document.getElementById('api-key-input')?.value || '').trim();
  if (!val) return;
  localStorage.setItem('anthropic_api_key', val);
  showToast('API key saved ✓');
  render('sync');
}

function clearApiKey() {
  if (confirm('Remove saved API key?')) {
    localStorage.removeItem('anthropic_api_key');
    render('sync');
  }
}

init();

// ── ANALYZE JD ───────────────────────────────────────────────────────────────

const ANALYZE_SYSTEM = `You are a job search analyst helping a senior product manager evaluate job postings.

CANDIDATE PROFILE:
- 7+ years Product Management experience in digital health / healthtech
- Specialties: care navigation, behavioral health analytics, 0-to-1 product builds, subscription/SaaS models, patient engagement
- Key experience: Aetna/CVS (behavioral health analytics platform, care navigation 0-1 launch "Access Plus", double-digit NPS improvement), digital health startups
- Education: MBA Medical Industry Leadership (UMN Carlson), BS Biomedical Sciences (Visible Heart Lab cardiac research)
- Location: Minneapolis MN — prefers remote or hybrid; open to remote EST hours
- Target comp: $130K–$180K base
- Stage preference: 0-to-1 builds, scaling digital products; Series A–C or large health system innovation teams
- Hard nos: comp below $120K, relocation required
- Open to: medtech Senior PM (upstream or downstream), Product Owner roles, payer-side experience; cardiac or neuro device experience a plus

IDEAL ROLE signals (boost fit score): digital health, care navigation, behavioral health, value-based care, 0-1 build, remote, $140K+, mission-driven, growth stage

RED FLAG signals (lower fit score): "competitive salary" with no range, 10+ years required for senior title, reposted >90 days, vague tech stack, requires relocation, medtech hardware only`;

let analyzeState = { open: false, loading: false, input: '', result: null, error: null };

function openAnalyzeModal() {
  analyzeState = { open: true, loading: false, input: '', result: null, error: null };
  renderAnalyzeModal();
}

function closeAnalyzeModal() {
  analyzeState.open = false;
  const m = document.getElementById('analyze-modal');
  if (m) m.remove();
}

function renderAnalyzeModal() {
  let m = document.getElementById('analyze-modal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'analyze-modal';
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px';
    document.body.appendChild(m);
  }

  const res = analyzeState.result;

  m.innerHTML = `
    <div style="background:var(--surf);border:1px solid var(--brd2);border-radius:12px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px;position:relative">
      <button onclick="closeAnalyzeModal()" style="position:absolute;top:12px;right:12px;font-size:16px;background:none;border:none;color:var(--muted);cursor:pointer">✕</button>
      <div style="font-size:16px;font-weight:600;color:var(--tx);margin-bottom:4px">🔍 Analyze Job Description</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Paste JD text or a URL — Claude will extract, score, and flag it in one shot.</div>

      ${!res ? `
        <div style="margin-bottom:12px">
          <textarea id="jd-input" placeholder="Paste job description text here, or paste a URL to fetch it…"
            style="width:100%;height:160px;font-size:12px;padding:10px;border:1px solid var(--brd2);border-radius:6px;background:var(--surf2);color:var(--tx);resize:vertical;box-sizing:border-box"
            oninput="analyzeState.input=this.value">${esc(analyzeState.input)}</textarea>
        </div>
        <div style="display:flex;gap:8px">
          <button class="amber" onclick="runAnalyze()" ${analyzeState.loading?'disabled':''} style="flex:1;padding:9px 0;font-size:13px">
            ${analyzeState.loading ? '<span class="spin"></span> Analyzing…' : '⚡ Analyze'}
          </button>
          <button onclick="closeAnalyzeModal()" style="font-size:12px">Cancel</button>
        </div>
        ${analyzeState.error ? `<div style="margin-top:10px;font-size:12px;color:var(--red)">${esc(analyzeState.error)}</div>` : ''}
      ` : `
        ${renderAnalyzeResult(res)}
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="amber" onclick="saveAnalyzedCard()" style="flex:1;padding:9px 0;font-size:13px">💾 Save to Tracker</button>
          <button onclick="analyzeState.result=null;analyzeState.input='';renderAnalyzeModal()" style="font-size:12px">← Analyze another</button>
          <button onclick="closeAnalyzeModal()" style="font-size:12px">Close</button>
        </div>
      `}
    </div>`;
}

function renderAnalyzeResult(r) {
  const fitColor = r.fitScore >= 7 ? 'var(--green)' : r.fitScore >= 5 ? 'var(--amber)' : 'var(--red)';
  const clarityColor = r.roleClarity >= 7 ? 'var(--green)' : r.roleClarity >= 5 ? 'var(--amber)' : 'var(--red)';

  const flags = (r.redFlags||[]).map(f =>
    `<div style="font-size:11px;padding:3px 8px;border-radius:4px;background:var(--red-pale,#fff0f0);border:1px solid var(--red-dim,#fcc);color:var(--red)">⚑ ${esc(f)}</div>`
  ).join('');

  return `
    <div style="margin-bottom:14px">
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:120px;background:var(--surf2);border-radius:8px;padding:10px 14px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:${fitColor}">${r.fitScore}<span style="font-size:13px;color:var(--muted)">/10</span></div>
          <div style="font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em">Fit Score</div>
        </div>
        <div style="flex:1;min-width:120px;background:var(--surf2);border-radius:8px;padding:10px 14px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:${clarityColor}">${r.roleClarity}<span style="font-size:13px;color:var(--muted)">/10</span></div>
          <div style="font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em">Role Clarity</div>
        </div>
        <div style="flex:2;min-width:200px;background:var(--surf2);border-radius:8px;padding:10px 14px">
          <div style="font-size:13px;font-weight:600;color:var(--tx)">${esc(r.company||'—')}</div>
          <div style="font-size:12px;color:var(--muted)">${esc(r.role||'—')}</div>
          <div style="font-size:11px;color:var(--faint);margin-top:2px">${esc(r.salary||'Comp not listed')} · ${esc(r.location||'Location unknown')}</div>
        </div>
      </div>

      ${flags ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${flags}</div>` : ''}

      <div style="font-size:11px;margin-bottom:6px">
        <span style="color:var(--muted);font-weight:500">Match criteria: </span>
        <span style="color:var(--faint)">${esc(r.matchCriteria||'—')}</span>
      </div>
      <div style="font-size:11px;margin-bottom:6px">
        <span style="color:var(--muted);font-weight:500">Fit rationale: </span>
        <span style="color:var(--faint)">${esc(r.fitRationale||'—')}</span>
      </div>
      ${r.compAnalysis ? `
      <div style="font-size:11px;margin-bottom:6px">
        <span style="color:var(--muted);font-weight:500">Comp check: </span>
        <span style="color:var(--faint)">${esc(r.compAnalysis)}</span>
      </div>` : ''}
      ${r.newsSnapshot ? `
      <div style="font-size:11px;background:var(--surf2);border-radius:6px;padding:8px 10px;margin-top:8px">
        <div style="color:var(--muted);font-weight:500;margin-bottom:4px">📰 Company news</div>
        <div style="color:var(--faint);line-height:1.6">${esc(r.newsSnapshot)}</div>
      </div>` : ''}
    </div>`;
}

async function runAnalyze() {
  const input = (document.getElementById('jd-input')?.value || '').trim();
  if (!input) return;
  analyzeState.loading = true;
  analyzeState.error = null;
  analyzeState.input = input;
  renderAnalyzeModal();

  const userPrompt = `Analyze this job posting and return ONLY a valid JSON object (no markdown, no preamble) with these exact keys:
{
  "company": "company name",
  "role": "job title",
  "salary": "salary range or empty string",
  "location": "location or Remote",
  "matchCriteria": "3-6 key requirements from the JD in brief format, semicolon separated",
  "fitScore": <number 1-10>,
  "fitRationale": "2-3 sentence explanation of the fit score against the candidate profile",
  "roleClarity": <number 1-10 — how well-written and specific is this JD>,
  "redFlags": ["flag 1", "flag 2"],
  "compAnalysis": "1-2 sentences on whether comp is above/below/at market for this role, level, and location",
  "newsSnapshot": "2-3 sentences: recent company news — funding, product launches, leadership changes, or layoffs. Use web search."
}

Job posting input:
${input}`;

  try {
    const key = getApiKey();
    if (!key) { analyzeState.error = 'Add your Anthropic API key in the Excel sync tab first'; analyzeState.loading = false; renderAnalyzeModal(); return; }
    const resp = await fetch(CLAUDE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-user-api-key': key },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: ANALYZE_SYSTEM,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(b => b.type==='text').map(b=>b.text).join('').trim();
    // Strip markdown fences if present
    const clean = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const result = JSON.parse(clean);
    analyzeState.result = result;
    analyzeState.loading = false;
  } catch(e) {
    analyzeState.error = 'Analysis failed: ' + e.message;
    analyzeState.loading = false;
  }
  renderAnalyzeModal();
}

function saveAnalyzedCard() {
  const r = analyzeState.result;
  if (!r) return;
  const notes = [r.newsSnapshot, r.compAnalysis].filter(Boolean).join(' | ');
  state.apps.push({
    id: Date.now(),
    company:    r.company || '',
    role:       r.role || '',
    salary:     r.salary || '',
    location:   r.location || '',
    fit:        r.fitScore ? String(r.fitScore) : '',
    keyReqs:    r.matchCriteria || '',
    gaps:       notes,
    stage:      'Saved',
    priority:   r.fitScore >= 8 ? 'High' : r.fitScore >= 6 ? 'Medium' : 'Low',
    date:       new Date().toISOString().slice(0,10),
    updatedAt:  new Date().toISOString(),
  });
  save();
  closeAnalyzeModal();
  render('tracker');
  showToast('Card saved to tracker ✓');
}

</script>
</body>
</html>
