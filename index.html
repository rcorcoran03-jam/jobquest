<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobQuest · 2026</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23E8F1F8'/%3E%3Cpolygon points='16,4 17.8,13.5 25,8 19.5,15.5 29,16 19.5,16.5 25,24 17.8,18.5 16,28 14.2,18.5 7,24 12.5,16.5 3,16 12.5,15.5 7,8 14.2,13.5' fill='%231C3347'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Avenir+Next:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
    :root {
    /* ── Navy backgrounds ── */
    --navy-deep:   #0B1C2E;
    --navy:        #0F2035;
    --navy-mid:    #1C3348;
    --navy-light:  #1E2E3E;
    --navy-border: rgba(255,255,255,0.08);
    --navy-border2: rgba(255,255,255,0.13);  /* alias for inputs/borders */
    --rose-light:   #F4C0D1;                 /* alias — same as --rose */
    --jade-mid:     rgba(91,158,201,0.35);   /* alias — same as new jade-mid */

    /* ── Sky blue — structural/titles/links ── */
    --jade:        #5B9EC9;
    --jade-light:  #7ABFE0;
    --jade-pale:   rgba(91,158,201,0.12);
    --jade-mid:    rgba(91,158,201,0.35);

    /* ── Rose — nav, labels, eyebrows, Healthtech card ── */
    --rose:        #F4C0D1;   /* primary visible rose — all text/labels */
    --rose-deep:   #C4607A;   /* deep rose — fills, buttons, card borders */
    --rose-pale:   rgba(196,96,122,0.10);
    --rose-border: rgba(244,192,209,0.35);

    /* ── Teal — Medtech card ── */
    --teal:        #2AB5A0;
    --teal-light:  #7ADDD0;
    --teal-pale:   rgba(42,181,160,0.10);
    --teal-border: rgba(42,181,160,0.30);
    --teal-bg:     rgba(42,181,160,0.10);
    --teal-dim:    rgba(42,181,160,0.35);

    /* ── Gold — Claude/Analyze JD only ── */
    --gold:        #C98A0E;
    --gold-pale:   rgba(201,138,14,0.10);
    --gold-border: rgba(201,138,14,0.35);

    /* ── Semantic ── */
    --green:     #2A9B7A; --green-bg: rgba(42,155,122,0.12); --green-dim: rgba(42,155,122,0.35);
    --red:       #C4607A; --red-bg:   rgba(196,96,122,0.12);
    --blue:      #4A9FD4; --blue-bg:  rgba(74,159,212,0.12);
    --purple:    #9B72CC; --purple-bg:rgba(155,114,204,0.12);
    --amber:     #C98A0E; --amber-dim:rgba(201,138,14,0.4); --amber-bg: rgba(201,138,14,0.12);
    --brd:       rgba(255,255,255,0.08); --brd2: rgba(255,255,255,0.14);

    /* ── Stage card backgrounds ── */
    --card-saved:              rgba(91,158,201,0.08);
    --card-applied:            rgba(74,159,212,0.10);
    --card-coffee:             rgba(196,96,122,0.08);
    --card-screen:             rgba(201,138,14,0.09);
    --card-interview:          rgba(201,138,14,0.11);
    --card-offer:              rgba(42,155,122,0.10);
    --card-rejected:           rgba(196,96,122,0.10);
    --card-ghosted:            rgba(155,114,204,0.08);
    --card-default:            var(--navy-light);

    /* ── Surfaces ── */
    --surf:  var(--navy-light);
    --surf2: var(--navy-light);

    /* ── Text ── */
    --tx:    #E8F1F8;
    --muted: #8BB8D4;
    --faint: #4A7A96;

    /* ── Typography ── */
    --serif: 'DM Serif Display', Georgia, serif;
    --sans:  'Avenir Next', 'Avenir', system-ui, sans-serif;
    --mono:  'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Deep navy floods the full viewport */
  body {
    background: var(--navy-deep);
    color: var(--tx);
    font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }
  a { color: var(--jade); }

  input, textarea, select, button {
    font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
    font-size: 12px;
  }
  input, textarea, select {
    background: rgba(255,255,255,0.06);
    color: var(--tx);
    border: 1px solid var(--navy-border2);
    border-radius: 6px;
    padding: 7px 11px;
    outline: none;
    width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  textarea { resize: vertical; }
  select { cursor: pointer; }
  button {
    cursor: pointer; border-radius: 6px;
    border: 1px solid var(--navy-border2);
    background: rgba(255,255,255,0.06);
    color: var(--tx);
    padding: 6px 14px;
    transition: all .15s;
    letter-spacing: .01em;
  }
  button:hover:not(:disabled) { background: rgba(91,158,201,0.15); border-color: var(--jade-mid); }
  button:disabled { opacity: .35; cursor: not-allowed; }
  button.amber { background: var(--rose-deep); color: #fff; border-color: var(--rose-deep); font-weight: 500; }
  button.amber:hover:not(:disabled) { background: #A84E65; border-color: #A84E65; }
  button.ghost { color: var(--faint); border-color: transparent; background: transparent; }
  button.danger { color: var(--rose-light); border-color: var(--rose-border); background: var(--rose-pale); }
  button.full { width: 100%; padding: 9px 0; font-size: 13px; }

  #nav {
    border-bottom: 1px solid rgba(255,255,255,0.07);
    height: 52px;
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    background: var(--navy);
    z-index: 100;
    gap: 12px;
  }
  #nav .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; align-self: center; }
  #nav .brand .logo {
    width: 28px; height: 28px; border-radius: 7px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #nav .brand-name { font-size: 17px; font-weight: 600; color: #E8F1F8; letter-spacing: -.2px; }
  #nav .brand-year { font-size: 10px; color: rgba(244,192,209,0.45); letter-spacing: .06em; margin-left: 2px; }

  #nav .portfolio-link {
    font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
    color: var(--rose); text-decoration: none;
    border: 1px solid var(--rose-border);
    padding: 4px 10px; border-radius: 5px;
    white-space: nowrap; transition: all .15s; flex-shrink: 0; align-self: center;
  }
  #nav .portfolio-link:hover { background: var(--rose-pale); }

  #nav .tabs { display: flex; gap: 1px; flex-wrap: nowrap; overflow: hidden; align-items: stretch; }
  #nav .tabs button {
    font-size: 11px; padding: 0 13px;
    background: transparent;
    border: none; border-bottom: 2px solid transparent;
    color: rgba(244,192,209,0.42);
    white-space: nowrap; height: 52px;
    transition: color .15s, border-color .15s, background .15s;
    letter-spacing: .01em;
  }
  #nav .tabs button:hover:not(:disabled) {
    color: var(--rose);
    background: rgba(244,192,209,0.04);
    border-bottom-color: rgba(244,192,209,0.25);
  }
  #nav .tabs button.active {
    color: var(--rose);
    border: 1px solid rgba(244,192,209,0.40);
    border-bottom: 2px solid var(--rose);
    background: rgba(244,192,209,0.06);
    font-weight: 600;
    border-radius: 4px 4px 0 0;
  }
  #nav .tabs button.active:hover:not(:disabled) {
    background: rgba(244,192,209,0.09);
  }
  #sync-status { font-size: 10px; color: rgba(184,212,232,0.55); letter-spacing: .03em; padding: 0 6px; white-space: nowrap; }

  /* ── MAIN — the "window in a window" content well ── */
  #main {
    max-width: 868px;
    margin: 24px auto;
    padding: 28px 28px;
    background: var(--navy-mid);
    border-radius: 14px;
    border: 1px solid rgba(91,160,210,0.14);
    box-shadow: 0 4px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .sec-head { margin-bottom: 24px; }
  .sec-eyebrow { font-size: 10px; color: var(--rose); letter-spacing: .12em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .sec-eyebrow::before { content: ''; display: inline-block; width: 16px; height: 1px; background: var(--rose-deep); }
  .sec-head h1 { font-family: 'DM Serif Display', Georgia, serif; font-size: 28px; font-style: normal; font-weight: 400; color: var(--jade-light); letter-spacing: -.01em; line-height: 1.1; margin-bottom: 5px; }
  .sec-head h1 em { font-style: italic; color: var(--rose); font-weight: 400; }
  .sec-head .bar { width: 28px; height: 2px; background: var(--rose-deep); border-radius: 1px; margin-top: 8px; }

  /* CARD */
  .card { background: var(--navy-light); border: 1px solid var(--navy-border); border-radius: 10px; padding: 1rem 1.25rem; animation: fadeIn .2s ease; margin-bottom: 10px; }
  .card:last-child { margin-bottom: 0; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:none } }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* GRID */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* LABEL */
  .lbl { font-size: 11px; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 4px; font-weight: 500; }

  /* BADGE */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; letter-spacing: .02em; white-space: nowrap; font-weight: 500; border: 1px solid transparent; }
  .badge.amber { background: var(--amber-bg); color: #E8C97A; border-color: var(--gold-border); }
  .badge.green { background: var(--green-bg); color: var(--jade-light); border-color: var(--jade-mid); }
  .badge.red   { background: var(--red-bg);   color: #E8907A;  border-color: var(--rose-border); }
  .badge.blue  { background: var(--blue-bg);  color: var(--jade); border-color: rgba(74,159,212,0.4); }
  .badge.purple{ background: var(--purple-bg);color: #C4A8E8;  border-color: rgba(155,114,204,0.4); }
  .badge.teal  { background: var(--teal-bg);  color: var(--teal); border-color: var(--teal-dim); }

  /* PILL */
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; background: rgba(91,158,201,0.10); border: 1px solid var(--navy-border); color: var(--muted); margin: 2px; }

  /* TAGS */
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--navy-border); background: rgba(255,255,255,0.04); color: var(--muted); }
  .tag:hover { border-color: var(--jade-mid); color: var(--jade); }
  .tag.on { background: var(--jade-pale); color: var(--jade-light); border-color: var(--jade-mid); font-weight: 500; }

  /* SPINNER */
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--navy-border2); border-top-color: var(--jade); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }

  /* ROW */
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 0; color: var(--faint); }

  /* FEEDBACK / MSG BOXES */
  .fb-box { margin-top: 10px; padding: 10px 12px; border-radius: 8px; background: var(--jade-pale); border: 1px solid rgba(91,158,201,0.25); font-size: 12px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
  .fb-box .fb-lbl { color: var(--jade-light); font-size: 11px; font-weight: 600; display: block; margin-bottom: 4px; }
  .msg-box { padding: 10px 12px; border-radius: 8px; background: var(--gold-pale); border: 1px solid var(--gold-border); font-size: 12px; color: var(--tx); line-height: 1.7; white-space: pre-wrap; }

  /* ERROR */
  .err { color: #E8907A; font-size: 12px; padding: 10px 12px; border-radius: 6px; background: var(--rose-pale); border: 1px solid var(--rose-border); margin-bottom: 10px; }

  /* POMODORO */
  #pom-svg { transform: rotate(-90deg); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy-deep); }
  ::-webkit-scrollbar-thumb { background: rgba(91,160,210,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(91,160,210,0.45); }

  /* PROFILE PANEL */
  #profile-panel {
    position: fixed; top: 0; right: -620px; width: 600px; height: 100vh;
    background: var(--navy-mid); border-left: 1px solid var(--navy-border2);
    z-index: 1000; transition: right .3s ease; overflow-y: auto;
    display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0,0,0,0.5);
  }
  #profile-panel.open { right: 0; }
  #profile-overlay { display: none; position: fixed; inset: 0; background: rgba(6,14,22,.55); z-index: 999; }
  #profile-overlay.open { display: block; }
  .profile-header { padding: 16px 20px; border-bottom: 1px solid var(--navy-border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--navy-mid); z-index: 1; }
  .profile-body { padding: 20px; flex: 1; }
  .profile-section-head { font-size: 11px; color: var(--jade-light); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; margin-top: 16px; }
  .profile-body p { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .profile-streaming { font-size: 12px; color: var(--muted); line-height: 1.8; white-space: pre-wrap; }
  .profile-loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; padding: 20px 0; }

  /* SETTINGS */
  #settings-screen { max-width: 500px; margin: 0 auto; }

  /* STAGE FILTERS */
  .stage-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
</style>
</head>
<body>

<div id="profile-overlay" onclick="closeProfilePanel()"></div>
<div id="profile-panel">
  <div class="profile-header">
    <div>
      <div id="profile-panel-title" style="font-size:14px;font-weight:500;color:var(--tx)">Company Profile</div>
      <div id="profile-panel-sub" style="font-size:11px;color:var(--muted);margin-top:2px"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="profile-copy-btn" onclick="copyProfile()" style="font-size:11px;display:none">Copy</button>
      <button onclick="closeProfilePanel()" style="font-size:18px;border:none;background:none;color:var(--muted);padding:4px 8px">×</button>
    </div>
  </div>
  <div class="profile-body">
    <div id="profile-panel-content"></div>
  </div>
</div>

<div id="nav">
  <div class="brand">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <polygon points="16,3 17.9,13 25.5,7.5 19.8,15.5 30,16 19.8,16.5 25.5,24.5 17.9,19 16,29 14.1,19 6.5,24.5 12.2,16.5 2,16 12.2,15.5 6.5,7.5 14.1,13" fill="#E8F1F8"/>
      </svg>
    </div>
    <span class="brand-name">JobQuest</span><span class="brand-year">2026</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end;overflow:hidden;align-self:center">
    <span id="sync-status"></span>
    <div class="tabs">
      <button class="active" onclick="showTab('board')" id="tab-board">Job board</button>
      <button onclick="showTab('tracker')" id="tab-tracker">Applications</button>
      <button onclick="showTab('pomodoro')" id="tab-pomodoro">Focus timer</button>
      <button onclick="showTab('network')" id="tab-network">Networking</button>
      <button onclick="showTab('sync')" id="tab-sync">Excel sync</button>
    </div>
    <a href="https://ryan-corcoran.com" target="_blank" class="portfolio-link">Portfolio ↗</a>
  </div>
</div>

<div id="main">
  <div id="pane-board"></div>
  <div id="pane-tracker" style="display:none"></div>
  <div id="pane-pomodoro" style="display:none"></div>
  <div id="pane-network" style="display:none"></div>
  <div id="pane-targets" style="display:none"></div>
  <div id="pane-sync" style="display:none"></div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────

const PROFILE = `Senior PM · Digital Health · Behavioral Health Analytics · Care Navigation · 0-1 Product Builds · MBA (Medical Industry, UMN Carlson) · BS Biomedical Sciences · Minneapolis MN · Remote-first · $120K–$160K target · 5+ yrs experience`;

// Each preset runs 2-3 query variants in parallel and merges results
const PRESETS = [
  {l:'PM – Digital Health',        qs:['"product manager" "digital health"', 'product manager healthtech healthcare remote', '"senior product manager" health technology']},
  {l:'Sr PM – Care Navigation',    qs:['"product manager" "care navigation"', '"product manager" "care coordination" health', 'product manager navigation "health plan"']},
  {l:'PM – Behavioral Health',     qs:['"product manager" "behavioral health"', '"product manager" "mental health" technology', 'product manager EAP "employee assistance"']},
  {l:'PM – Value-Based Care',      qs:['"product manager" "value-based care"', '"product manager" "population health"', 'product manager "risk adjustment" healthcare']},
  {l:'PM – Health Analytics',      qs:['"product manager" "healthcare analytics"', '"product manager" "health data" platform', 'product manager "clinical analytics" OR "claims data"']},
  {l:'PM – Patient Engagement',    qs:['"product manager" "patient engagement"', '"product manager" "patient experience" digital', 'product manager "member engagement" health']},
  {l:'PM – Telehealth',            qs:['"product manager" telehealth', '"product manager" "virtual care"', 'product manager telemedicine remote digital']},
  {l:'PM – HealthTech Startup',    qs:['product manager healthtech startup remote', '"senior product manager" "Series" health', '"product manager" "digital health" startup equity']},
];

const STAGES = ['Saved','Coffee / Networking','Applied','Phone Screen','Interview','Final Round','Offer','Rejected','Ghosted'];
const STAGE_COL = {Saved:'purple',Applied:'blue','Coffee / Networking':'teal','Phone Screen':'amber',Interview:'amber','Final Round':'green',Offer:'green',Rejected:'red',Ghosted:'purple'};
const STAGE_CARD_BG = {
  Saved:'var(--card-saved)', Applied:'var(--card-applied)',
  'Coffee / Networking':'var(--card-coffee)',
  'Phone Screen':'var(--card-screen)', Interview:'var(--card-interview)',
  'Final Round':'var(--card-offer)', Offer:'var(--card-offer)',
  Rejected:'var(--card-rejected)', Ghosted:'var(--card-ghosted)',
};

const POM_TASKS = [
  'Search 3 new job boards','Tailor resume for a role','Write a cover letter',
  'Send 2 networking messages','Research a target company','Update application tracker',
  'Prep 5 interview answers','Follow up on an application','Review job alerts','Update LinkedIn',
];

const REL_COL = {Warm:'amber',Alumni:'blue',Cold:'purple',Recruiter:'green'};

// ── DEFAULT DATA ──────────────────────────────────────────────────────────────

const DEFAULT_APPS = [
  {id:1,company:'Enliven Health (Omnicell)',role:'PM – Clinical Solutions',stage:'Applied',priority:'High',date:'2026-04-30',salary:'$125–150K',notes:'Clinical pharmacy tech'},
  {id:2,company:'Oasis Health Partners',role:'Senior Manager, Product',stage:'Applied',priority:'High',date:'2026-04-30',salary:'$118–160K',notes:'Clare MesserSchmidt – warm contact'},
  {id:3,company:'Vori Health',role:'PM – Patient Experience',stage:'Applied',priority:'High',date:'2026-01-25',salary:'Not listed',notes:'Virtual MSK care'},
  {id:4,company:'Health-E Commerce',role:'Sr. PM – Telehealth',stage:'Applied',priority:'High',date:'2026-02-10',salary:'$140–180K',notes:'0-1 telehealth build'},
  {id:5,company:'Strive Health',role:'Digital PM – Patient Engagement',stage:'Saved',priority:'High',date:'',salary:'Not listed',notes:'Series D funded'},
  {id:6,company:'H1 Provider Intelligence',role:'Sr. PM – Digital Health Data',stage:'Saved',priority:'High',date:'',salary:'$130–155K',notes:'Open until Jun 24'},
];

const DEFAULT_CONTACTS = [
  {id:1,name:'Clare MesserSchmidt',company:'Oasis Health Partners',role:'Recruiter',rel:'Warm',last:'2026-04-26',next:'2026-05-10',notes:'Strong connection, future roles likely'},
  {id:2,name:'Greg Seely',company:'ABOUT Healthcare',role:'Alumni',rel:'Alumni',last:'2026-03-04',next:'2026-05-15',notes:'Outreach sent 3/4/26'},
  {id:3,name:'Dave Moen',company:'Oasis / Reema Health',role:'Network',rel:'Warm',last:'2026-04-10',next:'2026-05-12',notes:'Connected to multiple target companies'},
  {id:4,name:'Ben R.',company:'Reema Health',role:'Network',rel:'Warm',last:'2026-03-15',next:'2026-05-20',notes:'Minneapolis digital health network'},
];

// ── STATE ─────────────────────────────────────────────────────────────────────

let state = {
  tab: 'board',
  // Cloud credentials (persisted to localStorage — device-only, not synced)
  jbKey:  localStorage.getItem('jb_key')  || '',
  jbBin:  localStorage.getItem('jb_bin')  || '',
  adzunaId:  localStorage.getItem('adzuna_id')  || '',
  adzunaKey: localStorage.getItem('adzuna_key') || '',
  // Cloud sync status
  cloudLoading: false, cloudStatus: '', cloudError: '',
  // App data (loaded from JSONBin on startup, falls back to defaults)
  apps: DEFAULT_APPS,
  contacts: DEFAULT_CONTACTS,
  // Ephemeral UI state
  jobs: [], jobTotal: 0, jobPage: 1, jobLoading: false,
  jobPreset: 0, jobCustomQ: '', jobWhere: '', jobSalary: '120000', jobDays: '30', jobSort: 'date',
  jobBlocklist: [], // kept for backwards compat, no longer used

// ── JSONBIN CLOUD SYNC ────────────────────────────────────────────────────────

const JB_URL = 'https://api.jsonbin.io/v3/b';

function jbHeaders(extra={}) {
  return { 'Content-Type': 'application/json', 'X-Master-Key': state.jbKey, ...extra };
}

// Create a new bin — called once during first-time setup
async function jbCreate() {
  const payload = { apps: state.apps, contacts: state.contacts, version: 1 };
  const resp = await fetch(JB_URL, {
    method: 'POST',
    headers: { ...jbHeaders(), 'X-Bin-Name': 'ryans-hunt-2026', 'X-Bin-Private': 'true' },
    body: JSON.stringify(payload)
  });
  if (!resp.ok) { const e = await resp.text(); throw new Error(`Create failed ${resp.status}: ${e.slice(0,200)}`); }
  const data = await resp.json();
  return data.metadata.id;
}

// Read latest data from bin
async function jbRead() {
  const resp = await fetch(`${JB_URL}/${state.jbBin}/latest`, {
    headers: jbHeaders({ 'X-Bin-Meta': 'false' })
  });
  if (!resp.ok) throw new Error(`Read failed ${resp.status}`);
  return resp.json(); // returns the record directly when X-Bin-Meta: false
}

// Write current apps+contacts+tasks+referrals to bin (debounced)
async function jbWrite() {
  if (!state.jbKey || !state.jbBin) return;
  const payload = {
    apps: state.apps, contacts: state.contacts,
    tasks: state.tasks, referrals: state.referrals,
    version: 2, updatedAt: new Date().toISOString()
  };
  const resp = await fetch(`${JB_URL}/${state.jbBin}`, {
    method: 'PUT', headers: jbHeaders(), body: JSON.stringify(payload)
  });
  if (!resp.ok) throw new Error(`Write failed ${resp.status}`);
}

// ── PERSISTENCE ───────────────────────────────────────────────────────────────

// Always save credentials to localStorage (device-level, intentionally local)
function saveCredentials() {
  if (state.jbKey)     localStorage.setItem('jb_key',      state.jbKey);
  if (state.jbBin)     localStorage.setItem('jb_bin',      state.jbBin);
  if (state.adzunaId)  localStorage.setItem('adzuna_id',   state.adzunaId);
  if (state.adzunaKey) localStorage.setItem('adzuna_key',  state.adzunaKey);
}

// Debounced cloud save — batches rapid changes into one write, 1.5s after last change
function save() {
  saveCredentials();
  // Always persist tasks/referrals locally (fast, no cloud needed)
  localStorage.setItem('tasks', JSON.stringify(state.tasks));
  localStorage.setItem('referrals', JSON.stringify(state.referrals));
  if (!state.jbKey || !state.jbBin) {
    localStorage.setItem('apps_backup', JSON.stringify(state.apps));
    localStorage.setItem('contacts_backup', JSON.stringify(state.contacts));
    return;
  }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncStatus('saving…', false);
    try {
      await jbWrite();
      setSyncStatus('✓ synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), false);
    } catch(e) {
      setSyncStatus('⚠ sync failed — ' + e.message, true);
    }
  }, 1500);
}

function setSyncStatus(msg, isError) {
  state.cloudStatus = msg; state.cloudError = isError;
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = isError ? 'var(--red)' : 'var(--green)'; }
}

// Load data from JSONBin on startup
async function loadFromCloud() {
  if (!state.jbKey || !state.jbBin) {
    // No cloud configured — try localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    const contactsBackup = localStorage.getItem('contacts_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
    if (contactsBackup) state.contacts = JSON.parse(contactsBackup);
    return;
  }
  try {
    const data = await jbRead();
    if (data.apps)    state.apps    = data.apps;
    if (data.contacts) state.contacts = data.contacts;
    setSyncStatus('✓ loaded from cloud', false);
  } catch(e) {
    setSyncStatus('⚠ cloud load failed — using local data', true);
    // Fall back to localStorage backup
    const appsBackup = localStorage.getItem('apps_backup');
    if (appsBackup) state.apps = JSON.parse(appsBackup);
  }
}

// Use relative /api/claude proxy unless running as a local file (file://)
// This works on any Netlify domain including preview/branch deploys
const CLAUDE_URL = '/api/claude';
function getApiKey() { return localStorage.getItem('anthropic_api_key') || ''; }

async function claudeStream(prompt, onChunk) {
  const key = getApiKey();
  if (!key) { showToast('Add your Anthropic API key in the Excel sync tab first'); return ''; }
  const resp = await fetch(CLAUDE_URL, {
    method:'POST', headers:{'Content-Type':'application/json','x-user-api-key':key},
    body: JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,stream:true,messages:[{role:'user',content:prompt}]})
  });
  const reader = resp.body.getReader(), dec = new TextDecoder();
  let full = '';
  while(true) {
    const {done,value} = await reader.read(); if(done) break;
    for(const line of dec.decode(value).split('\n').filter(l=>l.startsWith('data: '))) {
      try { const j=JSON.parse(line.slice(6)); if(j.delta?.text){full+=j.delta.text;onChunk?.(full);} } catch{}
    }
  }
  return full;
}

async function claudeJSON(prompt) {
  const key = getApiKey();
  if (!key) { showToast('Add your Anthropic API key in the Excel sync tab first'); return []; }
  const resp = await fetch(CLAUDE_URL, {
    method:'POST', headers:{'Content-Type':'application/json','x-user-api-key':key},
    body: JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,messages:[{role:'user',content:prompt}]})
  });
  const data = await resp.json();
  const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
  const s=text.indexOf('['),e=text.lastIndexOf(']');
  if(s===-1||e===-1) return [];
  return JSON.parse(text.slice(s,e+1));
}

async function adzunaSearch({q,where,salary,days,page=1,perPage=20}) {

    app_id:state.adzunaId, app_key:state.adzunaKey,
    results_per_page:perPage, what:q, 'content-type':'application/json', sort_by:'date'
  });
  if(where) p.set('where',where);
  if(salary) p.set('salary_min',salary);
  if(days) p.set('max_days_old',days);
  const resp = await fetch(`https://api.adzuna.com/v1/api/jobs/us/search/${page}?${p}`);
  if(!resp.ok){ const e=await resp.text(); throw new Error(`Adzuna ${resp.status}: ${e.slice(0,200)}`); }
  return resp.json();
}

  // Helper: open all boards for a panel
  window.openAllBoards = function(panel) {
    const boards = panel === 'ht' ? HT_BOARDS : MT_BOARDS;
    const cb = boards.find(b => b.clipboard);
    if (cb) { navigator.clipboard?.writeText(cb.clipboard); showToast('Search term copied for boards that need it'); }
    boards.forEach(b => window.open(b.url, '_blank'));
  };

  document.getElementById('li-keywords').addEventListener('input', updateLiPreview);

  document.getElementById('li-time').addEventListener('change', updateLiPreview);
  document.getElementById('li-exp').addEventListener('change', updateLiPreview);
}


function buildLinkedInURL() {
  const kw  = document.getElementById('li-keywords')?.value || 'senior product manager digital health';
  const loc = document.getElementById('li-location')?.value || 'Minneapolis, MN';
  const time = document.getElementById('li-time')?.value || 'month';
  const exp  = document.getElementById('li-exp')?.value  || 'senior';
  const p = new URLSearchParams();
  p.set('keywords', kw);
  if(loc) p.set('location', loc);
  if(LINKEDIN_TIME[time]) p.set('f_TPR', LINKEDIN_TIME[time]);
  if(LINKEDIN_EXP[exp])   p.set('f_E',   LINKEDIN_EXP[exp]);
  return LINKEDIN_BASE + '?' + p.toString();
}

function updateLiPreview() {
  const url = buildLinkedInURL();
  const el = document.getElementById('li-url-preview');
  if(el) el.textContent = url;
}

function openLinkedIn() { window.open(buildLinkedInURL(), '_blank'); }

function copyLinkedInURL() {
  navigator.clipboard?.writeText(buildLinkedInURL());
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = orig, 1500);
}

function openAll(idx) {
  const ql = QUICK_LAUNCHES[idx];
  const hasCB = ql.urls.some(u => u.clipboard);
  if (hasCB) {
    const firstUrl = ql.urls.find(u => !u.clipboard);
    let term = ql.label;
    if (firstUrl) { try { term = new URL(firstUrl.url).searchParams.get('keywords') || ql.label; } catch(e) {} }
    navigator.clipboard?.writeText(term);
  }
  ql.urls.forEach(u => window.open(u.url, '_blank'));
  if (hasCB) showToast('Search term copied — paste on any board that opens');
}

function openBoardWithClip(url, e) {
  const btn = e.target;
  let term = 'senior product manager';
  try {
    const card = btn.closest('.card') || btn.parentElement.parentElement;
    const otherBtns = card.querySelectorAll('button[onclick*="window.open"]');
    for (const ob of otherBtns) {
      const m = ob.getAttribute('onclick').match(/keywords=([^&'"]+)/);
      if (m) { term = decodeURIComponent(m[1].replace(/\+/g,' ')); break; }
    }
  } catch(err) {}
  navigator.clipboard?.writeText(term);
  window.open(url, '_blank');
  showToast('Search term copied — paste it on the page that opens');
}

function showToast(msg) {
  let t = document.getElementById('clip-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'clip-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--amber);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.style.opacity = '0', 3000);
}

function appFormHTML(prefix, app={}) {
  const pairs = [];
  let leftover = null;
  for(const f of APP_FORM_FIELDS) {
    if(f.type==='stage') {
      const field = `<div>${lbl(f.label)}${sel(`${prefix}-stage`,STAGES,app.stage||'Saved')}</div>`;
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
      continue;
    }
    if(f.type==='priority') {
      const field = `<div>${lbl(f.label)}${sel(`${prefix}-priority`,['High','Medium','Low'],app.priority||'High')}</div>`;
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
      continue;
    }
    const field = `<div>${lbl(f.label)}${inp(`${prefix}-${f.key}`,app[f.key]||'',f.ph)}</div>`;
    if(!f.half) {
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}<div></div></div>`); leftover=null; }
      pairs.push(`<div style="margin-bottom:8px">${lbl(f.label)}${inp(`${prefix}-${f.key}`,app[f.key]||'',f.ph)}</div>`);
    } else {
      if(leftover){ pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}${field}</div>`); leftover=null; }
      else leftover=field;
    }
  }
  if(leftover) pairs.push(`<div class="g2" style="margin-bottom:8px">${leftover}<div></div></div>`);
  return pairs.join('');
}

function readAppForm(prefix) {
  const get = k => { const el=document.getElementById(`${prefix}-${k}`); return el?el.value.trim():''; };
  const obj = {};
  APP_FORM_FIELDS.forEach(f => { obj[f.key] = get(f.key); });
  obj.stage    = get('stage');
  obj.priority = get('priority');
  return obj;
}

function renderTracker(el) {
  const HIDDEN_STAGES = ['Rejected','Ghosted'];
  const MEDTECH_COS   = ['boston scientific','bsc','medtronic','abbott','stryker','anteris','nalu','penumbra','cardiovalve','shockwave'];
  const HEALTH_COS    = ['spring health','lyra','modern health','accolade','oasis','reema','transcarent','included health','unite us','gravie','optum','uhg','aetna','cvs','cigna','humana','elevance'];

  function isMedtech(a) { const c=(a.company||'').toLowerCase(); return MEDTECH_COS.some(k=>c.includes(k)); }
  function isHealthtech(a) { const c=(a.company||'').toLowerCase(); return HEALTH_COS.some(k=>c.includes(k)); }

    case 'recent':    const cutoff=new Date(Date.now()-14*86400000).toISOString().slice(0,10);
                      list = list.filter(a=>!HIDDEN_STAGES.includes(a.stage) && (a.updatedAt||a.date||'')>=cutoff); break;
    case 'medtech':   list = list.filter(a=>!HIDDEN_STAGES.includes(a.stage) && isMedtech(a)); break;
    case 'healthtech':list = list.filter(a=>!HIDDEN_STAGES.includes(a.stage) && isHealthtech(a)); break;
    case 'priority':  list = list.filter(a=>!HIDDEN_STAGES.includes(a.stage) && a.priority!=='High'); break;
    case 'archived':  list = list.filter(a=>HIDDEN_STAGES.includes(a.stage)); break;

function toggleHighPriority(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  const currentlyHigh = app.priority==='High';
  if(!currentlyHigh) {
    const highCount = state.apps.filter(a=>a.priority==='High' && !['Rejected','Ghosted'].includes(a.stage)).length;

  }
  state.apps = state.apps.map(a=>a.id===id?{...a,priority:currentlyHigh?'Medium':'High',updatedAt:new Date().toISOString()}:a);
  save(); render('tracker');
}

function toggleExpand(id) {
  if(!state.appExpanded) state.appExpanded={};
  state.appExpanded[id] = !state.appExpanded[id];
  render('tracker');
}

function toggleExpandTop(id) {

}


function setAppFilter(f) { state.appFilter=f; state.appEditing=null; render('tracker'); }

function setAppStage(id,stage) {

}

function delApp(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;

function addApp() {

function copyPrepPrompt(id) {

// ── COMPANY PROFILE PANEL ─────────────────────────────────────────────────────

function openProfilePanel(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  state.profilePanelApp = app;
  state.profilePanelText = '';

  document.getElementById('profile-panel-title').textContent = app.company;
  document.getElementById('profile-panel-sub').textContent = app.role || '';
  document.getElementById('profile-copy-btn').style.display = 'none';
  document.getElementById('profile-panel-content').innerHTML =
    `<div class="profile-loading"><span class="spin"></span>Researching ${esc(app.company)}…</div>`;
  document.getElementById('profile-panel').classList.add('open');
  document.getElementById('profile-overlay').classList.add('open');
  buildProfile(app);
}

function closeProfilePanel() {
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('profile-overlay').classList.remove('open');
}

async function buildProfile(app) {
  const prompt = `You are a company research assistant preparing Ryan Corcoran for a job application or coffee meeting. Ryan: Senior PM, digital health, behavioral health analytics at Aetna/CVS, care navigation platform (0-1 launch), MBA Medical Industry Leadership (UMN Carlson), BS Biomedical Sciences (Visible Heart Lab), Minneapolis MN.

Company: ${app.company}
Role: ${app.role || 'Product Manager'}
Stage: ${app.stage}
Context: ${app.gaps || app.notes || ''}

Use web search to research this company. Produce a concise, scannable profile:

**🏢 Snapshot** — what they do, size, stage (startup/PE/public), HQ, founded
**💰 Business model** — how they make money, revenue or funding if known
**🛍️ Products** — core product(s), who they serve, key features
**🎯 Strategic position** — top 2-3 competitors with one-line differentiator each
**📈 Tailwinds** — 2-3 macro trends they are riding
**📰 Recent news** — last 6 months, anything relevant to this role
**🗣️ Talking points** — 4-5 specific points bridging Ryan's background to this company (use real numbers and product names)
**📊 Numbers to know** — 5-8 key stats to have memorized
**❓ Smart questions to ask** — 3 specific questions tailored to this stage (${app.stage})

Be specific throughout. If PE-backed, flag what that means strategically. Flag if the company has had recent layoffs or funding challenges.`;

  try {
    await claudeStream(prompt, t => {
      state.profilePanelText = t;
      const content = document.getElementById('profile-panel-content');
      if(!content) return;
      const html = t
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--tx)">$1</strong>')
        .replace(/^(#{1,3}) (.+)$/gm, (_,h,txt) => `<div class="profile-section-head" style="margin-top:${h.length===1?'0':'14px'}">${txt}</div>`)
        .replace(/^[-•] (.+)$/gm, '<div style="padding:2px 0 2px 10px;color:var(--muted);font-size:12px;line-height:1.7;border-left:2px solid var(--brd);margin:2px 0">$1</div>')
        .split('\n').map(line => line.startsWith('<')||!line.trim() ? line : `<p style="font-size:12px;color:var(--muted);line-height:1.7;margin:3px 0">${line}</p>`).join('\n');
      content.innerHTML = html;
    });
    document.getElementById('profile-copy-btn').style.display = 'block';
  } catch(e) {
    const content = document.getElementById('profile-panel-content');
    if(content) content.innerHTML = `<div style="color:var(--red);font-size:12px;padding:10px">Profile generation failed: ${esc(e.message)}<br><br>Make sure your Anthropic API key is set in Netlify environment variables.</div>`;
  }
}

function copyProfile() {
  navigator.clipboard?.writeText(state.profilePanelText);
  const btn = document.getElementById('profile-copy-btn');
  if(btn){ btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',1500); }
}


// ── POMODORO ──────────────────────────────────────────────────────────────────

function renderPomodoro(el) {
  const cur = [{key:'focus',label:'Focus',mins:25,col:'var(--amber)'},{key:'short',label:'Short break',mins:5,col:'var(--green)'},{key:'long',label:'Long break',mins:15,col:'var(--blue)'}][state.pomMode];
  const R=80, Circ=2*Math.PI*R, pct=state.pomSecs/state.pomTotal;
  const mm=String(Math.floor(state.pomSecs/60)).padStart(2,'0'), ss=String(state.pomSecs%60).padStart(2,'0');

  const taskBtns = POM_TASKS.map(t => `<button class="tag ${state.pomTask===t&&!state.pomCustomTask?'on':''}" onclick="setPomTask('${esc(t)}')">${esc(t)}</button>`).join('');

  const logRows = state.pomLog.slice(-6).reverse().map(l =>
    `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px"><span>${esc(l.task)}</span><span style="color:var(--faint)">${l.time} · ${l.mins}m</span></div>`
  ).join('');

  const dots = [...Array(4)].map((_,i) => `<div style="width:14px;height:14px;border-radius:50%;background:${i<(state.pomSessions%4)?'var(--amber)':'var(--surf)'};border:1px solid var(--brd)"></div>`).join('');

  el.innerHTML = secHead('Focus timer') + `
    <div class="row" style="margin-bottom:20px">
      ${[{l:'Focus',c:'var(--amber)'},{l:'Short break',c:'var(--green)'},{l:'Long break',c:'var(--blue)'}].map((m,i)=>`<button onclick="switchPomMode(${i})" style="flex:1;color:${state.pomMode===i?m.c:'var(--muted)'};border-color:${state.pomMode===i?m.c:'var(--brd)'}">${m.l}</button>`).join('')}
    </div>
    <div style="display:flex;justify-content:center;margin-bottom:20px">
      <div style="position:relative;width:200px;height:200px">
        <svg id="pom-svg" width="200" height="200">
          <circle cx="100" cy="100" r="${R}" fill="none" stroke="var(--surf)" stroke-width="8"/>
          <circle cx="100" cy="100" r="${R}" fill="none" stroke="${cur.col}" stroke-width="8" stroke-dasharray="${Circ}" stroke-dashoffset="${Circ*(1-pct)}" stroke-linecap="round" style="transition:${state.pomRunning?'stroke-dashoffset 1s linear':'none'}"/>
        </svg>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:42px;font-weight:500;letter-spacing:-2px;color:var(--tx)">${mm}:${ss}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${cur.label}</div>
        </div>
      </div>
    </div>
    <div class="row" style="justify-content:center;margin-bottom:16px">
      <button class="${state.pomRunning?'':'amber'}" style="min-width:90px;font-size:13px" onclick="togglePom()">${state.pomRunning?'Pause':state.pomSecs===state.pomTotal?'Start':'Resume'}</button>
      <button style="font-size:13px" onclick="resetPom()">Reset</button>
    </div>
    <div class="row" style="margin-bottom:16px">
      ${inp('pom-custom',state.pomCustomMins,'Custom duration (mins)','flex:1')}
      <button onclick="applyPomCustom()">Set</button>
    </div>
    <div class="card" style="margin-bottom:12px">
      ${lbl('Current task')}
      <div class="tag-row" style="margin-top:8px">${taskBtns}</div>
      ${inp('pom-task-custom',state.pomCustomTask,'Or type a custom task…')}
    </div>
    <div class="row" style="margin-bottom:${state.pomLog.length?'12px':'0'}">${dots}<span style="font-size:12px;color:var(--muted)">${state.pomSessions} session${state.pomSessions!==1?'s':''} today</span></div>
    ${state.pomLog.length?`<div class="card">${lbl('Today\'s log')}${logRows}</div>`:''}
  `;
  document.getElementById('pom-custom').addEventListener('input',e=>state.pomCustomMins=e.target.value);
  document.getElementById('pom-task-custom').addEventListener('input',e=>{ state.pomCustomTask=e.target.value; if(e.target.value) state.pomTask=''; });
}

function switchPomMode(i) {
  clearInterval(pomInterval); pomInterval=null;
  const mins=[25,5,15][i];
  state.pomMode=i; state.pomRunning=false; state.pomTotal=mins*60; state.pomSecs=mins*60;
  render('pomodoro');
}

function togglePom() {
  if(state.pomRunning) { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; }
  else {
    state.pomRunning=true;
    pomInterval=setInterval(()=>{
      state.pomSecs--;
      if(state.pomSecs<=0) {
        clearInterval(pomInterval); pomInterval=null; state.pomRunning=false;
        if(state.pomMode===0) {
          state.pomSessions++;
          state.pomLog.push({task:state.pomCustomTask||state.pomTask,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),mins:[25,5,15][state.pomMode]});
        }
        state.pomSecs=0;
      }
      render('pomodoro');
    },1000);
  }
  render('pomodoro');
}

function resetPom() { clearInterval(pomInterval); pomInterval=null; state.pomRunning=false; state.pomSecs=state.pomTotal; render('pomodoro'); }

function applyPomCustom() {
  const m=parseInt(document.getElementById('pom-custom').value);
  if(!m||m<1||m>120) return;
  clearInterval(pomInterval); pomInterval=null;
  state.pomRunning=false; state.pomTotal=m*60; state.pomSecs=m*60; state.pomCustomMins='';
  render('pomodoro');
}

function setPomTask(t) { state.pomTask=t; state.pomCustomTask=''; render('pomodoro'); }

// ── NETWORKING CRM ────────────────────────────────────────────────────────────

function renderNetwork(el) {
  const today=new Date();
  const overdue=d=>d&&new Date(d)<today;
  const soon=d=>d&&new Date(d)>=today&&new Date(d)<=new Date(today.getTime()+7*86400000);
  const od=state.contacts.filter(c=>overdue(c.next)).length;
  const sd=state.contacts.filter(c=>soon(c.next)).length;

  const contactForm = (prefix, c={}, isEdit=false) => `
    <div class="card" style="border-color:var(--jade-mid);margin-bottom:12px">
      <div class="g2" style="margin-bottom:8px">
        ${inp(`${prefix}-name`, c.name||'', 'Name')}
        ${inp(`${prefix}-co`, c.company||'', 'Company')}
        ${inp(`${prefix}-role`, c.role||'', 'Their role')}
        ${sel(`${prefix}-rel`, ['Warm','Alumni','Cold','Recruiter'], c.rel||'Warm')}
        ${inp(`${prefix}-last`, c.last||'', 'Last touch (YYYY-MM-DD)')}
        ${inp(`${prefix}-next`, c.next||'', 'Next touch (YYYY-MM-DD)')}
      </div>
      ${inp(`${prefix}-notes`, c.notes||'', 'Notes — how you know them, context')}
      <div class="row" style="margin-top:8px">
        <button class="amber" onclick="${isEdit ? `saveEditContact(${c.id})` : 'addContact()'}">${isEdit ? 'Save changes' : 'Save'}</button>
        <button onclick="${isEdit ? `state.netEditing=null;render('network')` : `state.netShowAdd=false;render('network')`}">Cancel</button>
        ${isEdit ? `<button class="danger" onclick="deleteContact(${c.id})" style="margin-left:auto">Delete</button>` : ''}
      </div>
    </div>`;

  const addForm = state.netShowAdd ? contactForm('net') : '';

  const cards = state.contacts.map(c => {
    if (state.netEditing === c.id) return contactForm(`edit-${c.id}`, c, true);
    const ov=overdue(c.next), sn=soon(c.next);
    const brdCol=ov?'var(--red)':sn?'var(--amber)':'var(--brd)';
    return `<div class="card" style="margin-bottom:8px;border-left:3px solid ${brdCol};border-radius:0 10px 10px 0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div class="row" style="margin-bottom:3px;flex-wrap:wrap">
            <span style="font-size:14px;font-weight:600;color:var(--tx)">${esc(c.name)}</span>
            ${badge(c.rel,REL_COL[c.rel]||'amber')}
            ${ov?badge('follow up overdue','red'):''}${!ov&&sn?badge('due soon','amber'):''}
          </div>
          <div style="color:var(--muted);font-size:12px">${esc(c.role)} · ${esc(c.company)}</div>
          ${c.notes?`<div style="font-size:11px;color:var(--faint);margin-top:2px">${esc(c.notes)}</div>`:''}
          <div style="font-size:11px;color:var(--faint);margin-top:2px">${c.last?`last: ${c.last}`:''}${c.next?` · next: ${c.next}`:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;align-items:flex-end">
          <button onclick="state.netEditing=${c.id};state.netShowAdd=false;render('network')" style="font-size:11px;color:var(--rose-light);border-color:var(--rose-border)">Edit</button>
          <button onclick="copyNetPrompt('linkedin','${esc(c.id)}')" style="font-size:11px;color:var(--jade);border-color:var(--jade-mid);background:var(--jade-pale);white-space:nowrap">📋 LinkedIn msg</button>
          <button onclick="copyNetPrompt('followup','${esc(c.id)}')" style="font-size:11px;white-space:nowrap">📋 Follow-up</button>
          <button onclick="copyNetPrompt('intro','${esc(c.id)}')" style="font-size:11px;white-space:nowrap">📋 Referral ask</button>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = secHead('Networking') + `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:12px;color:var(--muted)">
        <span style="color:var(--red)">${od} overdue</span> · <span style="color:var(--amber)">${sd} due this week</span>
      </div>
      <button class="amber" onclick="state.netShowAdd=!state.netShowAdd;state.netEditing=null;render('network')">+ Add contact</button>
    </div>
    <div class="card" style="margin-bottom:16px;background:var(--jade-pale);border-color:var(--jade-mid)">
      <div style="font-size:12px;color:var(--jade-light);line-height:1.7">
        <strong>📋 Prompt buttons</strong> copy a pre-filled prompt to your clipboard — paste directly into Claude chat to generate the message. Three types: LinkedIn intro, follow-up, and referral ask.
      </div>
    </div>
    ${addForm}${cards || '<div class="empty">No contacts yet. Add people from your network above.</div>'}
  `;
}

function addContact() {
  const name=document.getElementById('net-name').value.trim(); if(!name)return;
  state.contacts.push({
    id:Date.now(), name,
    company: document.getElementById('net-co').value,
    role:    document.getElementById('net-role').value,
    rel:     document.getElementById('net-rel').value,
    last:    document.getElementById('net-last').value,
    next:    document.getElementById('net-next').value,
    notes:   document.getElementById('net-notes').value,
  });
  state.netShowAdd=false; save(); render('network');
}

function saveEditContact(id) {
  const prefix = `edit-${id}`;
  const get = k => { const el=document.getElementById(`${prefix}-${k}`); return el?el.value.trim():''; };
  const name = get('name'); if(!name) return;
  const idx = state.contacts.findIndex(x=>x.id===id);
  if(idx===-1) return;
  state.contacts[idx] = {
    ...state.contacts[idx],
    name,
    company: get('co'),
    role:    get('role'),
    rel:     get('rel'),
    last:    get('last'),
    next:    get('next'),
    notes:   get('notes'),
  };
  state.netEditing = null;
  save(); render('network');
  showToast('Contact updated ✓');
}

function deleteContact(id) {
  if (!confirm('Delete this contact?')) return;
  state.contacts = state.contacts.filter(x=>x.id!==id);
  state.netEditing = null;
  save(); render('network');
  showToast('Contact deleted');
}

function copyNetPrompt(type, id) {
  const c = state.contacts.find(x=>String(x.id)===String(id)); if(!c) return;
  let prompt = '';
  if(type === 'linkedin') {

const APP_COLS  = ['Company','Role Title','Salary Range','Location / Remote','Date Applied','Stage','Priority','Fit Score','Key Requirement Match','Gaps / Notes','Next Step','Next Step Date','Recruiter / Contact','Link / Source','Networking Contact','Relationship / Status'];
const APP_KEYS  = ['company','role','salary','location','date','stage','priority','fit','keyReqs','gaps','nextStep','nextDate','contact','source','netContact','netRel'];
const NET_COLS  = ['Company','Role','Alumni Contact','Relationship','Last Touch','Next Touch','Status','Notes'];
const NET_KEYS  = ['company','role','name','rel','last','next','status','notes'];

function csvEscape(v) {
  const s = String(v == null ? '' : v);
  return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
}

function toCSV(rows, cols) {
  return [cols.join(','), ...rows.map(r => APP_KEYS.map ? r : r)].join('\n');
}

function appsToCSV() {
  const header = APP_COLS.join(',');
  const rows = state.apps.map(a =>
    APP_KEYS.map(k => csvEscape(a[k]||'')).join(',')
  );
  return [header, ...rows].join('\n');
}

function contactsToCSV() {
  const header = NET_COLS.join(',');
  const rows = state.contacts.map(c =>
    NET_KEYS.map(k => csvEscape(c[k]||'')).join(',')
  );
  return [header, ...rows].join('\n');
}

function downloadCSV(content, filename) {
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => { obj[h.trim()] = (vals[i]||'').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
    else if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

function importAppsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, skipped:0, msg:'No rows found in file.'};

  // Try to detect column mapping — accepts both exact Excel headers and app-internal keys
  const colMap = {};
  const firstRow = rows[0];
  const allHeaders = Object.keys(firstRow);

  // Map Excel column names → internal keys
  const excelToKey = {};
  APP_COLS.forEach((col,i) => { excelToKey[col] = APP_KEYS[i]; });
  // Also accept lowercase/trimmed variants
  APP_COLS.forEach((col,i) => { excelToKey[col.toLowerCase()] = APP_KEYS[i]; });
  // Also accept direct key names
  APP_KEYS.forEach(k => { excelToKey[k] = k; excelToKey[k.toLowerCase()] = k; });

  // Build per-row mapping
  const headerMap = {}; // header name → internal key
  allHeaders.forEach(h => {
    const key = excelToKey[h] || excelToKey[h.trim().toLowerCase()];
    if(key) headerMap[h] = key;
  });

  if(!headerMap['Company'] && !headerMap['company']) {
    return {count:0, skipped:0, msg:`Could not find a "Company" column. Headers found: ${allHeaders.slice(0,5).join(', ')}…`};
  }

  let added=0, skipped=0, updated=0;
  const existingCos = state.apps.map(a=>a.company.toLowerCase().trim());

  rows.forEach(row => {
    const mapped = {};
    Object.entries(headerMap).forEach(([h,k]) => { mapped[k] = row[h]||''; });
    const co = (mapped.company||'').trim();
    if(!co) { skipped++; return; }

    const existIdx = existingCos.indexOf(co.toLowerCase());
    if(existIdx !== -1) {
      // Update existing — merge in any non-empty fields from CSV
      const existing = state.apps[existIdx];
      APP_KEYS.forEach(k => { if(mapped[k]) existing[k] = mapped[k]; });
      updated++;
    } else {
      state.apps.push({
        id: Date.now() + Math.random(),
        company: mapped.company||'',
        role: mapped.role||'',
        salary: mapped.salary||'',
        location: mapped.location||'',
        date: mapped.date||'',
        stage: mapped.stage||'Applied',
        priority: mapped.priority||'Medium',
        fit: mapped.fit||'',
        keyReqs: mapped.keyReqs||'',
        gaps: mapped.gaps||'',
        nextStep: mapped.nextStep||'',
        nextDate: mapped.nextDate||'',
        contact: mapped.contact||'',
        source: mapped.source||'',
        notes: mapped.notes||mapped.gaps||'',
      });
      added++;
    }
  });

  save();
  return {count:added, updated, skipped, msg:`Done — ${added} added, ${updated} updated, ${skipped} skipped (blank company).`};
}

function importContactsCSV(text) {
  const rows = parseCSV(text);
  if(!rows.length) return {count:0, msg:'No rows found.'};
  let added=0, skipped=0;
  const existingNames = state.contacts.map(c=>c.name.toLowerCase().trim());
  rows.forEach(row => {
    const name = (row['Alumni Contact']||row['Name']||row['name']||'').trim();
    if(!name){skipped++;return;}
    if(existingNames.includes(name.toLowerCase())){skipped++;return;}
    state.contacts.push({
      id: Date.now()+Math.random(), name,
      company: row['Company']||row['company']||'',
      role: row['Role']||row['role']||'',
      rel: row['Relationship']||row['rel']||'Warm',
      last: row['Last Touch']||row['last']||'',
      next: row['Next Touch']||row['next']||'',
      notes: row['Notes']||row['notes']||'',
    });
    added++;
  });
  save();
  return {count:added, skipped, msg:`Done — ${added} contacts added, ${skipped} skipped.`};
}

async function doCloudSetup() {
  const key = document.getElementById('setup-jb-key').value.trim();
  if (!key) { document.getElementById('setup-error').textContent = 'Please enter your Master Key.'; return; }
  const btn = document.getElementById('setup-btn');
  btn.disabled = true; btn.textContent = 'Creating bin…';
  state.jbKey = key;
  try {
    const binId = await jbCreate();
    state.jbBin = binId;
    saveCredentials();
    document.getElementById('setup-error').textContent = '';
    showTab('board');
    setSyncStatus('✓ cloud connected · bin ' + binId.slice(0,8) + '…', false);
  } catch(e) {
    state.jbKey = '';
    document.getElementById('setup-error').textContent = 'Error: ' + e.message;
    btn.disabled = false; btn.textContent = 'Create my data bin →';
  }
}

async function doExistingSetup() {
  const key = document.getElementById('setup-existing-key').value.trim();
  const bin = document.getElementById('setup-existing-bin').value.trim();
  if (!key || !bin) { document.getElementById('setup-error').textContent = 'Enter both Master Key and Bin ID.'; return; }
  state.jbKey = key; state.jbBin = bin;
  try {
    const data = await jbRead();
    if (data.apps) state.apps = data.apps;
    if (data.contacts) state.contacts = data.contacts;
    saveCredentials();
    showTab('board');
    setSyncStatus('✓ reconnected · ' + state.apps.length + ' apps loaded', false);
  } catch(e) {
    state.jbKey = ''; state.jbBin = '';
    document.getElementById('setup-error').textContent = 'Could not connect: ' + e.message;
  }
}

function skipCloudSetup() {
  localStorage.setItem('cloud_skipped', '1');
  showTab('board');
}

function disconnectCloud() {
  if (!confirm('Disconnect cloud sync? Your data stays on this device but won\'t sync to other devices.')) return;
  state.jbKey = ''; state.jbBin = '';
  localStorage.removeItem('jb_key'); localStorage.removeItem('jb_bin');
  localStorage.removeItem('cloud_skipped');
  location.reload();
}

async function init() {
  const hasCloud = state.jbKey && state.jbBin;

      </div>

      ${r.newsSnapshot ? `

async function runAnalyze() {
  const input = (document.getElementById('jd-input')?.value || '').trim();
  if (!input) return;
  analyzeState.loading = true;
  analyzeState.error = null;
  analyzeState.input = input;
  renderAnalyzeModal();

  const userPrompt = `Analyze this job posting and return ONLY a valid JSON object (no markdown, no preamble) with these exact keys:
{
  "company": "company name",
  "role": "job title",
  "salary": "salary range or empty string",
  "location": "location or Remote",
  "matchCriteria": "3-6 key requirements from the JD in brief format, semicolon separated",
  "fitScore": <number 1-10>,
  "fitRationale": "2-3 sentence explanation of the fit score against the candidate profile",
  "roleClarity": <number 1-10 — how well-written and specific is this JD>,
  "redFlags": ["flag 1", "flag 2"],
  "compAnalysis": "1-2 sentences on whether comp is above/below/at market for this role, level, and location",
  "newsSnapshot": "2-3 sentences: recent company news — funding, product launches, leadership changes, or layoffs. Use web search."
}

Job posting input:
${input}`;

  try {
    const key = getApiKey();
    if (!key) { analyzeState.error = 'Add your Anthropic API key in the Excel sync tab first'; analyzeState.loading = false; renderAnalyzeModal(); return; }
    const resp = await fetch(CLAUDE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-user-api-key': key },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: ANALYZE_SYSTEM,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(b => b.type==='text').map(b=>b.text).join('').trim();
    // Strip markdown fences if present
    const clean = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const result = JSON.parse(clean);
    analyzeState.result = result;
    analyzeState.loading = false;
  } catch(e) {
    analyzeState.error = 'Analysis failed: ' + e.message;
    analyzeState.loading = false;
  }
  renderAnalyzeModal();
}

function saveAnalyzedCard() {
  const r = analyzeState.result;
  if (!r) return;
  const notes = [r.newsSnapshot, r.compAnalysis].filter(Boolean).join(' | ');
  state.apps.push({
    id: Date.now(),
    company:    r.company || '',
    role:       r.role || '',
    salary:     r.salary || '',
    location:   r.location || '',
    fit:        r.fitScore ? String(r.fitScore) : '',
    keyReqs:    r.matchCriteria || '',
    gaps:       notes,
    stage:      'Saved',
    priority:   r.fitScore >= 8 ? 'High' : r.fitScore >= 6 ? 'Medium' : 'Low',
    date:       new Date().toISOString().slice(0,10),
    updatedAt:  new Date().toISOString(),
  });
  save();
  closeAnalyzeModal();
  render('tracker');
  showToast('Card saved to tracker ✓');
}

</script>
</body>
</html>
